<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KG Script - Ultimate System</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #111111;
            --border: #222222;
            --main: #00ffcc; 
            --gold: #ffcc00;
            --text: #ffffff;
            --text-sub: #aaaaaa;
            --red: #ff4d4d;
            --green: #00cc66;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; font-size: 14px; }

        /* 輸入框與按鈕 */
        input { width: 100%; padding: 14px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: var(--text); margin-bottom: 12px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--main); }
        
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        .btn-main { background-color: var(--main); color: #000; }
        .btn-gold { background-color: var(--gold); color: #000; }
        .btn-dark { background-color: #222; color: var(--text-sub); }
        .btn-red { background-color: var(--red); color: white; width: auto; padding: 6px 12px; font-size: 12px; }

        /* 導航選單 */
        .sidebar { position: fixed; left: -270px; top: 0; width: 260px; height: 100%; background: #080808; z-index: 2000; border-right: 1px solid var(--border); transition: 0.3s; padding: 60px 20px; }
        .sidebar.open { left: 0; box-shadow: 10px 0 30px #000; }
        .menu-item { padding: 16px; border-radius: 10px; color: var(--text-sub); cursor: pointer; margin-bottom: 8px; font-size: 14px; }
        .menu-item.active { background: rgba(0,255,204,0.1); color: var(--main); font-weight: bold; }
        .menu-btn { position: fixed; top: 15px; left: 15px; font-size: 24px; z-index: 2100; cursor: pointer; color: var(--text); background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 8px; }

        /* 介面容器 */
        .view { position: absolute; inset: 0; display: none; flex-direction: column; padding: 20px; padding-top: 80px; overflow-y: auto; }
        .view.active { display: flex; z-index: 10; }
        .card-wrap { width: 100%; max-width: 400px; margin: 0 auto; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 25px; margin-bottom: 15px; }
        
        /* 使用者資訊條 */
        .user-bar { display: flex; align-items: center; gap: 15px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 15px 20px; margin-bottom: 15px; }
        .avatar { width: 48px; height: 48px; background: #1a1a1a; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--main); border: 1px solid var(--border); }
        .status-tag { font-size: 10px; padding: 2px 8px; border-radius: 5px; margin-top: 4px; display: inline-block; }
        .tag-on { background: rgba(0,204,102,0.1); color: var(--green); }
        .tag-off { background: rgba(255,77,77,0.1); color: var(--red); }

        /* 列表樣式 */
        .list-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-top: 10px; }
        .list-item { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .list-item:last-child { border-bottom: none; }
        .item-title { font-family: monospace; font-size: 14px; }
        .item-info { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

        /* 公告與警告 */
        .notice { background: rgba(255,204,0,0.05); border: 1px solid rgba(255,204,0,0.1); border-radius: 10px; padding: 12px; color: var(--gold); font-size: 12px; margin-bottom: 15px; }
        .lock-banner { color: var(--red); background: rgba(255,77,77,0.1); border: 1px solid var(--red); padding: 12px; border-radius: 10px; font-weight: bold; margin-bottom: 15px; text-align: center; }

        /* 腳本顯示 */
        .script-box { background: #000; border: 1px dashed var(--main); padding: 15px; color: #0f0; font-family: monospace; font-size: 12px; border-radius: 10px; white-space: pre-wrap; margin: 15px 0; }
    </style>
</head>
<body>

<div class="menu-btn" onclick="toggleM()">☰</div>
<div class="sidebar" id="sidebar">
    <div class="menu-item active" id="m-auth" onclick="go('v-auth')">🔑 帳號系統</div>
    <div class="menu-item" id="m-dev" onclick="go('v-dev')">👥 開發者名單</div>
    <div class="menu-item" onclick="location.reload()">🔄 刷新系統</div>
</div>

<div id="app-container">
    <div id="v-auth" class="view active">
        <div class="card-wrap">
            
            <div class="card" id="box-login">
                <h2 style="margin:0 0 5px 0;">登入</h2>
                <p style="color:var(--text-sub); font-size:12px; margin-bottom:20px;">請登入您的帳號以進行驗證</p>
                <input type="text" id="l-user" placeholder="用戶名">
                <input type="password" id="l-pwd" placeholder="密碼">
                <button class="btn btn-main" onclick="doUserLogin()">登入腳本系統</button>
                <p style="text-align:center; font-size:12px; margin-top:20px;">
                    沒有帳號？ <span style="color:var(--main); cursor:pointer;" onclick="switchBox('box-reg')">立即註冊</span>
                </p>
                <button class="btn-dark btn" style="font-size:11px; margin-top:15px;" onclick="switchBox('box-admin-login')">⚙️ 管理員入口</button>
            </div>

            <div class="card" id="box-reg" style="display:none">
                <h2>註冊</h2>
                <input type="text" id="r-user" placeholder="設定用戶名">
                <input type="password" id="r-pwd" placeholder="設定密碼">
                <button class="btn btn-main" onclick="doReg()">完成註冊</button>
                <p style="text-align:center; font-size:12px; margin-top:15px; color:var(--text-sub); cursor:pointer;" onclick="switchBox('box-login')">返回登入</p>
            </div>

            <div id="box-user-panel" style="display:none">
                <div class="user-bar">
                    <div class="avatar" id="u-avatar">?</div>
                    <div style="flex:1">
                        <div id="u-name" style="font-weight:bold; font-size:16px;">User</div>
                        <div id="u-tag" class="status-tag tag-off">未激活</div>
                    </div>
                </div>
                <div class="notice">
                    <b>系統公告：</b><br>請輸入有效的卡密進行激活，激活後可解鎖專屬腳本。
                </div>
                <div class="card" id="p-active">
                    <input type="text" id="active-key" placeholder="輸入卡密 (KG-XXXXXX)">
                    <button class="btn btn-main" onclick="doActiveKey()">激活帳號</button>
                    <button class="btn-dark btn" style="margin-top:10px;" onclick="location.reload()">登出</button>
                </div>
                <div class="card" id="p-script" style="display:none; border-color:var(--green);">
                    <h3 style="color:var(--green); margin-top:0;">腳本已解鎖</h3>
                    <div class="script-box" id="script-content"></div>
                    <button class="btn btn-main" onclick="copyScript()">複製腳本代碼</button>
                    <button class="btn-dark btn" style="margin-top:10px;" onclick="location.reload()">安全登出</button>
                </div>
            </div>

            <div class="card" id="box-admin-login" style="display:none; border-color:var(--gold);">
                <h2 style="color:var(--gold); margin-top:0;">管理員驗證</h2>
                <div id="lock-notice" class="lock-banner" style="display:none"></div>
                <input type="text" id="a-user" placeholder="管理員帳號">
                <input type="password" id="a-pwd" placeholder="管理員密碼">
                <button class="btn btn-gold" onclick="doAdminLogin()">進入後台</button>
                <p style="text-align:center; font-size:11px; color:#555; margin-top:15px;" onclick="switchBox('box-login')">返回</p>
            </div>

            <div id="box-admin-panel" style="display:none">
                <div class="card" style="border-color:var(--gold);">
                    <h2 style="color:var(--gold); margin-top:0;">控制中心</h2>
                    <div style="display:flex; gap:8px;">
                        <button class="btn btn-gold" style="flex:1; font-size:12px;" onclick="renderKeys()">卡密管理</button>
                        <button class="btn btn-gold" style="flex:1; font-size:12px;" onclick="renderUsers()">用戶清單</button>
                    </div>
                </div>
                <div style="font-weight:bold; margin:20px 0 10px 5px;" id="list-title">名單管理</div>
                <div class="list-box" id="admin-list"></div>
                <button class="btn-dark btn" style="margin-top:20px;" onclick="location.reload()">退出後台</button>
            </div>

        </div>
    </div>

    <div id="v-dev" class="view">
        <div class="card-wrap">
            <div class="card">
                <h2 style="color:var(--main); margin-top:0;">👥 開發與貢獻</h2>
                <div style="font-size:13px; line-height:1.8;">
                    <b style="color:var(--main)">腳本團隊：</b><br>
                    總創作者：張碩<br>
                    合作者：雷歐REO_ROBLOX<br><br>
                    <b style="color:var(--main)">技術與設計：</b><br>
                    網站開發：雷歐REO_ROBLOX<br>
                    管理員：雷歐REO_ROBLOX、張碩<br><br>
                    <b style="color:var(--main)">特別鳴謝：</b><br>
                    全體 KG 腳本使用者
                </div>
                <button class="btn btn-main" style="margin-top:25px;" onclick="go('v-auth')">返回首頁</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 系統變數
    let users = JSON.parse(localStorage.getItem('kg_u')) || [];
    let keys = JSON.parse(localStorage.getItem('kg_k')) || [];
    let adminStats = JSON.parse(localStorage.getItem('kg_admin_stats')) || { fail: 0, lockUntil: 0, authDevice: null };
    let curU = null;

    // 取得手機唯一 ID
    const myId = localStorage.getItem('kg_device_id') || (()=>{let i='KG-'+Math.random().toString(36).substr(2,9).toUpperCase();localStorage.setItem('kg_device_id',i);return i;})();
    localStorage.setItem('kg_device_id', myId);

    // 檢查封鎖狀態
    function checkLock() {
        if (Date.now() < adminStats.lockUntil) {
            const days = Math.ceil((adminStats.lockUntil - Date.now()) / (1000 * 60 * 60 * 24));
            document.getElementById('lock-notice').innerText = `系統鎖定中，剩餘 ${days} 天`;
            document.getElementById('lock-notice').style.display = 'block';
            return true;
        }
        return false;
    }

    // --- 使用者功能 ---
    function doUserLogin() {
        const u = document.getElementById('l-user').value, p = document.getElementById('l-pwd').value;
        const found = users.find(x => x.name === u && x.pwd === p);
        if(found) {
            curU = found; updateUserPanel(); switchBox('box-user-panel');
        } else alert("帳號或密碼錯誤");
    }

    function doReg() {
        const u = document.getElementById('r-user').value, p = document.getElementById('r-pwd').value;
        if(!u || !p) return alert("資訊不完整");
        if(users.find(x => x.name === u)) return alert("帳號已存在");
        users.push({name:u, pwd:p, active: false});
        localStorage.setItem('kg_u', JSON.stringify(users));
        alert("註冊成功！"); switchBox('box-login');
    }

    function doActiveKey() {
        const input = document.getElementById('active-key').value.trim();
        const kIdx = keys.findIndex(k => k.key === input);
        if(kIdx !== -1) {
            keys.splice(kIdx, 1); localStorage.setItem('kg_k', JSON.stringify(keys));
            curU.active = true; localStorage.setItem('kg_u', JSON.stringify(users));
            updateUserPanel(); alert("激活成功！腳本已發放。");
        } else alert("無效的卡密");
    }

    function updateUserPanel() {
        document.getElementById('u-avatar').innerText = curU.name[0].toUpperCase();
        document.getElementById('u-name').innerText = curU.name;
        const tag = document.getElementById('u-tag');
        if(curU.active) {
            tag.innerText = "已激活授權"; tag.className = "status-tag tag-on";
            document.getElementById('p-active').style.display = "none";
            document.getElementById('p-script').style.display = "block";
            document.getElementById('script-content').innerText = `-- KG Script 授權代碼\nprint("KG腳本啟動中...")\n-- [請在此處貼上您的腳本內容]`;
        } else {
            tag.innerText = "未激活帳號"; tag.className = "status-tag tag-off";
        }
    }

    function copyScript() {
        navigator.clipboard.writeText(document.getElementById('script-content').innerText);
        alert("代碼已複製");
    }

    // --- 管理員核心 ---
    function doAdminLogin() {
        if(checkLock()) return;
        const u = document.getElementById('a-user').value, p = document.getElementById('a-pwd').value;

        if(adminStats.authDevice && adminStats.authDevice !== myId) return alert("❌ 此裝置未獲得授權");

        if(u === "admin" && p === "KGscriptWEB:admin") {
            if(!adminStats.authDevice) adminStats.authDevice = myId;
            adminStats.fail = 0; saveAdmin();
            alert("管理員登入成功"); switchBox('box-admin-panel');
        } else {
            adminStats.fail++;
            if(adminStats.fail >= 2) {
                adminStats.lockUntil = Date.now() + (30*24*60*60*1000);
                users = []; keys = []; localStorage.clear(); // 毀滅性清空
                saveAdmin(); alert("⚠️ 錯誤兩次！數據已全抹除並封鎖30天");
                location.reload();
            } else { saveAdmin(); alert("密碼錯誤！剩餘 1 次機會"); }
        }
    }

    function renderKeys() {
        document.getElementById('list-title').innerText = "可用卡密庫";
        let h = `<div style="padding:15px; border-bottom:1px solid var(--border);"><button class="btn btn-gold" onclick="genK()">+ 生成新卡密</button></div>`;
        h += keys.map((k,i)=>`<div class="list-item"><div class="item-title">${k.key}</div><button class="btn-red" onclick="delK(${i})">作廢</button></div>`).join('');
        document.getElementById('admin-list').innerHTML = h || '<p style="text-align:center;color:#444">暫無卡密</p>';
    }

    function renderUsers() {
        document.getElementById('list-title').innerText = "用戶帳密名單";
        let h = users.map((u,i)=>`<div class="list-item"><div><div class="item-title">${u.name}</div><div class="item-info">密碼: ${u.pwd} | ${u.active?'<span style="color:var(--green)">已激活</span>':'未激活'}</div></div><button class="btn-red" onclick="delU(${i})">刪除</button></div>`).join('');
        document.getElementById('admin-list').innerHTML = h || '<p style="text-align:center;color:#444">暫無用戶</p>';
    }

    function genK() {
        keys.push({key: 'KG-'+Math.random().toString(36).substr(2,6).toUpperCase()+'-'+Math.random().toString(36).substr(2,6).toUpperCase()});
        localStorage.setItem('kg_k', JSON.stringify(keys)); renderKeys();
    }
    function delU(i) { users.splice(i,1); localStorage.setItem('kg_u', JSON.stringify(users)); renderUsers(); }
    function delK(i) { keys.splice(i,1); localStorage.setItem('kg_k', JSON.stringify(keys)); renderKeys(); }

    // --- UI 控制 ---
    function switchBox(id) {
        ['box-login','box-reg','box-user-panel','box-admin-login','box-admin-panel'].forEach(b => document.getElementById(b).style.display='none');
        document.getElementById(id).style.display='block';
        if(id === 'box-admin-panel') renderKeys();
    }
    function go(id) {
        ['v-auth','v-dev'].forEach(v => document.getElementById(v).classList.toggle('active', v===id));
        ['m-auth','m-dev'].forEach(m => document.getElementById(m).classList.toggle('active', m==='m-'+id.split('-')[1]));
        toggleM(false);
    }
    function saveAdmin() { localStorage.setItem('kg_admin_stats', JSON.stringify(adminStats)); }
    function toggleM(f) { document.getElementById('sidebar').classList.toggle('open', f); }
    window.onload = checkLock;
</script>
</body>
</html>
