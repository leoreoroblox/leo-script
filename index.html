<!DOCTYPE html>
<html lang="zh-TW" oncontextmenu="return false">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEO HUB | FINAL V12.8</title>
    <style>
        :root { --primary: #00ffcc; --bg: #050505; --glass: rgba(255,255,255,0.03); --admin-red: #ff4d4d; --gold: #ffd700; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; color: #fff; background: #000; }
        
        /* 加載動畫 */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s; }
        .spinner { width: 60px; height: 60px; border: 4px solid rgba(0,255,204,0.1); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* UI 元件 */
        .glass { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; }
        .btn { background: var(--primary); color: #000; padding: 12px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; width: 100%; margin-top: 10px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.6); color: #fff; box-sizing: border-box; outline: none; }
        .error-msg { color: var(--admin-red); font-size: 11px; text-align: left; display: none; margin-bottom: 10px; }

        /* 導航 */
        .header { position: fixed; top: 0; width: 100%; height: 60px; display: flex; align-items: center; padding: 0 20px; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.8); }
        .sidebar { position: fixed; left: -280px; top: 0; width: 260px; height: 100%; padding-top: 80px; transition: 0.4s; z-index: 200; background: #080808; border-right: 1px solid var(--primary); }
        .sidebar.active { left: 0; }
        .nav-item { padding: 15px 25px; cursor: pointer; opacity: 0.7; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-item.active { opacity: 1; color: var(--primary); background: rgba(0,255,204,0.1); }

        /* 視圖 */
        .view { display: none; padding: 80px 20px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .view.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 管理員數據統計表 */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; text-align: center; }
        .stat-val { font-size: 22px; font-weight: 900; color: var(--primary); }
        .stat-label { font-size: 10px; opacity: 0.5; }

        #toast { position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 12px 30px; border-radius: 50px; font-weight: bold; transition: 0.4s; z-index: 9999; }
    </style>
</head>
<body onload="init()">

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top:20px; color:var(--primary); letter-spacing:3px;">SYSTEM BOOTING...</p>
</div>

<header class="header">
    <div onclick="toggleMenu()" style="cursor:pointer; font-size:24px;">☰</div>
    <div style="margin-left:20px; font-weight:900;">LEO HUB <span id="u-tag" style="font-size:10px; opacity:0.3;">GUEST</span></div>
</header>

<aside class="sidebar" id="sb">
    <div class="nav-item active" onclick="go('v-auth')">🔐 帳戶驗證</div>
    <div class="nav-item" onclick="go('v-copy')">📋 腳本複製</div>
    <div class="nav-item" onclick="go('v-creators')">👥 創作者名單</div>
    <div class="nav-item" onclick="go('v-admin')" id="adm-nav" style="display:none; color:var(--admin-red);">⚙️ 管理後台</div>
    <div class="nav-item" onclick="location.reload()" style="opacity:0.3; margin-top:20px;">🚪 退出登入</div>
</aside>

<main>
    <div id="v-auth" class="view active">
        <div class="glass" style="max-width:380px; margin:auto; padding:30px;">
            <h2 id="auth-title" style="text-align:center;">登入系統</h2>
            
            <div style="display:flex; gap:5px; margin-bottom:20px;">
                <button class="btn" style="font-size:11px;" onclick="setAuth('user')">用戶</button>
                <button class="btn" style="font-size:11px; background:#333; color:#fff;" onclick="setAuth('admin')">管理員</button>
            </div>

            <input type="text" id="ipt-u" placeholder="使用者名稱 (英數字與一個_)">
            <div id="err-u" class="error-msg"></div>
            
            <input type="password" id="ipt-p" placeholder="密碼 (英數字與一個_)">
            <div id="err-p" class="error-msg"></div>

            <input type="password" id="ipt-p2" placeholder="確認密碼" style="display:none;">
            
            <button class="btn" onclick="handleAuth()" id="main-btn">確認</button>
            <p id="sw-text" onclick="toggleReg()" style="text-align:center; font-size:12px; color:var(--primary); cursor:pointer; margin-top:20px;">點此註冊</p>
        </div>
    </div>

    <div id="v-copy" class="view">
        <div id="s-list" style="max-width:600px; margin:auto;"></div>
    </div>

    <div id="v-creators" class="view">
        <div class="glass" style="max-width:500px; margin:auto; padding:25px;">
            <h3 style="color:var(--primary);">腳本創作者名單</h3>
            <p>總策劃 / 總創作者 / 腳本創作：張碩</p>
            <p>合作者：雷歐REO_ROBLOX</p>
            <hr style="opacity:0.1;">
            <p>網站總負責人 / 設計 / 程式：雷歐REO_ROBLOX</p>
            <p>網站管理員：雷歐REO_ROBLOX，張碩</p>
        </div>
    </div>

    <div id="v-admin" class="view">
        <div style="max-width:600px; margin:auto;">
            <div class="glass" style="padding:20px; margin-bottom:20px;">
                <h3 style="margin:0 0 15px;">📊 系統統計數據</h3>
                <div class="stat-grid">
                    <div class="stat-box"><div class="stat-val" id="st-v">0</div><div class="stat-label">總訪問次數</div></div>
                    <div class="stat-box"><div class="stat-val" id="st-u">0</div><div class="stat-label">總註冊人數</div></div>
                    <div class="stat-box"><div class="stat-val" id="st-s">0</div><div class="stat-label">總使用次數</div></div>
                    <div class="stat-box"><div class="stat-val" id="st-i">0</div><div class="stat-label">資源總數量</div></div>
                </div>
            </div>
            <div class="glass" style="padding:20px;">
                <h3>🛠️ 發布新腳本</h3>
                <input id="ad-n" placeholder="腳本名">
                <input id="ad-c" placeholder="代碼">
                <button class="btn" onclick="addS()">發布</button>
            </div>
        </div>
    </div>
</main>

<div id="toast">系統通知</div>

<script>
    // 強制更新緩存名稱
    let USERS = JSON.parse(localStorage.getItem('DB_USERS_NEW')) || [];
    let SCRIPTS = JSON.parse(localStorage.getItem('DB_SCRIPTS_NEW')) || [{n:"腳本 V1", c:"print('LEO')"}];
    let STATS = JSON.parse(localStorage.getItem('DB_STATS_NEW')) || {v:0, s:0};
    let sess = null, isReg = false, mode = 'user';

    function init() {
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            STATS.v++; save();
        }, 1200);
    }

    function msg(t){ const o=document.getElementById('toast'); o.innerText=t; o.style.bottom='40px'; setTimeout(()=>o.style.bottom='-80px',2500); }
    function toggleMenu(){ document.getElementById('sb').classList.toggle('active'); }
    function save(){ 
        localStorage.setItem('DB_USERS_NEW', JSON.stringify(USERS)); 
        localStorage.setItem('DB_SCRIPTS_NEW', JSON.stringify(SCRIPTS));
        localStorage.setItem('DB_STATS_NEW', JSON.stringify(STATS));
    }

    function go(id){
        if(id!=='v-auth' && id!=='v-creators' && !sess) return msg("⚠️ 請先登入");
        document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        toggleMenu();
        if(id==='v-copy') drawS();
        if(id==='v-admin') drawStats();
    }

    // 嚴格格式驗證
    function validate(str, isUser) {
        const underscores = (str.match(/_/g) || []).length;
        if(underscores !== 1) return "必須包含且只有一個底線(_)";
        if(str.startsWith('_') || str.endsWith('_')) return "底線不能在開頭或結尾";
        if(isUser && (str.length < 3 || str.length > 15)) return "長度須在 3-15 字";
        if(!isUser && (str.length < 5 || str.length > 200)) return "長度須在 5-200 字";
        return true;
    }

    function setAuth(m){ mode = m; isReg = false; msg("切換模式: " + m); }
    function toggleReg(){ isReg = !isReg; document.getElementById('ipt-p2').style.display = isReg ? "block" : "none"; }

    function handleAuth(){
        const u = document.getElementById('ipt-u').value.trim();
        const p = document.getElementById('ipt-p').value.trim();
        const p2 = document.getElementById('ipt-p2').value.trim();
        
        document.getElementById('err-u').style.display = 'none';
        document.getElementById('err-p').style.display = 'none';

        if(mode === 'admin'){
            if(u === 'admin' && p === 'LEO_888'){ sess = {u:"管理員", role:"admin"}; loginOk(); }
            else { msg("❌ 管理員驗證失敗"); }
            return;
        }

        const vU = validate(u, true);
        const vP = validate(p, false);

        if(vU !== true){ const e=document.getElementById('err-u'); e.innerText=vU; e.style.display='block'; return; }
        if(vP !== true){ const e=document.getElementById('err-p'); e.innerText=vP; e.style.display='block'; return; }

        if(isReg){
            if(p !== p2) return msg("❌ 兩次密碼不符");
            if(USERS.find(x=>x.u === u)) return msg("❌ 名稱已重複");
            USERS.push({u, p, role:'user'}); save();
            msg("✅ 註冊成功，請登入"); toggleReg();
        } else {
            const f = USERS.find(x=>x.u === u && x.p === p);
            if(f){ sess = f; loginOk(); } else { msg("❌ 帳密錯誤"); }
        }
    }

    function loginOk(){
        document.getElementById('u-tag').innerText = sess.u;
        if(sess.role==='admin') document.getElementById('adm-nav').style.display='block';
        msg("🔓 登入成功"); go('v-copy');
    }

    function drawStats(){
        document.getElementById('st-v').innerText = STATS.v;
        document.getElementById('st-u').innerText = USERS.length;
        document.getElementById('st-s').innerText = STATS.s;
        document.getElementById('st-i').innerText = SCRIPTS.length;
    }

    function drawS(){
        document.getElementById('s-list').innerHTML = SCRIPTS.map((s,i)=>`
            <div class="glass" style="padding:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                <b>${s.n}</b>
                <button class="btn" style="width:auto; padding:5px 15px;" onclick="copyS('${btoa(s.c)}')">複製</button>
            </div>
        `).join('');
    }

    function copyS(b){ navigator.clipboard.writeText(atob(b)); STATS.s++; save(); msg("📋 複製成功"); }
    function addS(){ const n=document.getElementById('ad-n').value, c=document.getElementById('ad-c').value; SCRIPTS.push({n,c}); save(); msg("✅ 已發布"); drawStats(); }
</script>
</body>
</html>
