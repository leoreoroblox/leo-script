<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KG System</title>
    <style>
        :root { --main: #00ffcc; --bg: #0d0d0d; --card: #151515; --lock: #444; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; overflow: hidden; height: 100vh; }

        /* 導航選單 */
        .sidebar { position: fixed; left: -260px; top: 0; width: 250px; height: 100%; background: #050505; z-index: 1000; border-right: 1px solid #222; transition: 0.3s; padding-top: 60px; }
        .sidebar.open { left: 0; box-shadow: 10px 0 30px #000; }
        .menu-item { padding: 15px 20px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; color: #aaa; position: relative; }
        .menu-item.locked { color: var(--lock); }
        .menu-item.locked::after { content: '🔒'; position: absolute; right: 15px; font-size: 10px; }
        .menu-item:not(.locked):active { background: var(--main); color: #000; }
        .menu-btn { position: fixed; top: 15px; left: 15px; font-size: 24px; z-index: 1100; cursor: pointer; color: var(--main); }

        /* 內容容器 */
        #app-container { height: 100vh; position: relative; width: 100%; }
        .view { position: absolute; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; transform: scale(0.95); opacity: 0; transition: 0.4s; }
        .view.active { display: flex; transform: scale(1); opacity: 1; z-index: 10; }
        .view.exit { display: flex; transform: scale(1.05); opacity: 0; z-index: 5; }

        /* 卡片與輸入框 */
        .card { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 25px; width: 100%; max-width: 360px; text-align: center; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; border-radius: 10px; color: #fff; margin-bottom: 10px; outline: none; text-align: center; }
        input:focus { border-color: var(--main); }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--main); color: #000; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn:active { transform: scale(0.96); }
        .tip { font-size: 11px; color: #777; margin-bottom: 10px; text-align: left; background: #000; padding: 10px; border-radius: 8px; }
        .link { color: var(--main); font-size: 12px; cursor: pointer; margin-top: 15px; display: inline-block; }
    </style>
</head>
<body>

<div class="menu-btn" onclick="toggleM()">☰</div>
<div class="sidebar" id="sidebar">
    <div class="menu-item" onclick="go('v-auth')">🏠 帳號系統</div>
    <div class="menu-item locked" onclick="go('v-copy')">📋 腳本複製</div>
    <div class="menu-item locked" onclick="go('v-func')">✨ 腳本功能</div>
    <div class="menu-item locked" onclick="go('v-demo')">📺 腳本演示</div>
    <div class="menu-item locked" onclick="go('v-other')">🎮 其他腳本</div>
    <div class="menu-item" onclick="go('v-log')">📅 更新日誌</div>
    <div class="menu-item" onclick="go('v-pay')" style="color: gold;">💰 支持一下</div>
</div>

<div id="app-container">
    <div id="v-auth" class="view active">
        <div class="card" id="box-login">
            <h2 style="color:var(--main); margin-top:0;">KG LOGIN</h2>
            <input type="text" id="l-user" placeholder="使用者名稱">
            <input type="password" id="l-pwd" placeholder="密碼">
            <button class="btn" onclick="doLogin()">登入</button>
            <div style="display:flex; justify-content:space-between">
                <span class="link" onclick="switchBox('box-forgot')">忘記密碼？</span>
                <span class="link" onclick="switchBox('box-reg')">註冊帳號</span>
            </div>
        </div>

        <div class="card" id="box-reg" style="display:none">
            <h2 style="color:var(--main); margin-top:0;">REGISTER</h2>
            <div class="tip">
                * 名稱：3-15字 (英數/底線)<br>
                * 密碼：5-200字 (英數/底線)
            </div>
            <input type="text" id="r-user" placeholder="設定使用者名稱">
            <input type="password" id="r-pwd" placeholder="設定密碼">
            <input type="password" id="r-pwd2" placeholder="再次確認密碼">
            <button class="btn" onclick="doReg()">完成註冊</button>
            <span class="link" onclick="switchBox('box-login')">返回登入</span>
        </div>

        <div class="card" id="box-forgot" style="display:none">
            <h2 style="color:var(--main); margin-top:0;">RESET</h2>
            <div id="f-step1">
                <input type="text" id="f-user" placeholder="輸入使用者名稱">
                <button class="btn" onclick="checkF()">尋找帳號</button>
            </div>
            <div id="f-step2" style="display:none">
                <input type="password" id="f-pwd" placeholder="輸入新密碼">
                <button class="btn" onclick="resetF()">重設密碼</button>
            </div>
            <span class="link" onclick="switchBox('box-login')">返回登入</span>
        </div>
    </div>

    <div id="v-copy" class="view"><div class="card"><h3>📋 腳本複製</h3><button class="btn">Copy</button></div></div>
    <div id="v-func" class="view"><div class="card"><h3>✨ 腳本功能</h3><p>功能已開放</p></div></div>
    <div id="v-demo" class="view"><div class="card"><h3>📺 腳本演示</h3><p>演示影片</p></div></div>
    <div id="v-other" class="view"><div class="card"><h3>🎮 其他腳本</h3><p>更多資源</p></div></div>
    <div id="v-log" class="view"><div class="card"><h3>📅 更新日誌</h3><p>已移除圖片驗證碼。</p></div></div>
    <div id="v-pay" class="view"><div class="card"><h3>💰 支持一下</h3><p>感謝贊助</p></div></div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem('kg_u')) || [];
    let curId = 'v-auth';
    let isLog = false;
    let tmpUser = "";

    // 校驗規則：英數、可選下劃線
    function validate(str, min, max) {
        if (!str) return "不能為空";
        if (str.length < min || str.length > max) return `長度須在 ${min}-${max} 之間`;
        if (!/^[a-zA-Z0-9_]+$/.test(str)) return "僅限英文字母、數字、下劃線";
        return true;
    }

    function switchBox(id) {
        ['box-login','box-reg','box-forgot'].forEach(b => document.getElementById(b).style.display='none');
        document.getElementById(id).style.display='block';
    }

    function doReg() {
        const u = document.getElementById('r-user').value;
        const p = document.getElementById('r-pwd').value;
        const p2 = document.getElementById('r-pwd2').value;

        const uV = validate(u, 3, 15);
        if (uV !== true) return alert("名稱錯誤：" + uV);
        if (users.find(x => x.name === u)) return alert("此名稱已存在");

        const pV = validate(p, 5, 200);
        if (pV !== true) return alert("密碼錯誤：" + pV);
        if (p !== p2) return alert("密碼不一致");

        users.push({name:u, pwd:p});
        localStorage.setItem('kg_u', JSON.stringify(users));
        alert("註冊成功！"); switchBox('box-login');
    }

    function doLogin() {
        const u = document.getElementById('l-user').value;
        const p = document.getElementById('l-pwd').value;
        const found = users.find(x => x.name === u && x.pwd === p);
        if(found) {
            isLog = true; alert("登入成功！");
            document.querySelectorAll('.menu-item.locked').forEach(e => e.classList.remove('locked'));
            go('v-log');
        } else alert("帳號密碼錯誤");
    }

    function checkF() {
        const u = document.getElementById('f-user').value;
        if(users.find(x => x.name === u)) { 
            tmpUser = u; 
            document.getElementById('f-step1').style.display='none';
            document.getElementById('f-step2').style.display='block';
        } else alert("找不到帳號");
    }

    function resetF() {
        const p = document.getElementById('f-pwd').value;
        const pV = validate(p, 5, 200);
        if(pV !== true) return alert("密碼格式錯誤");
        let user = users.find(x => x.name === tmpUser);
        user.pwd = p;
        localStorage.setItem('kg_u', JSON.stringify(users));
        alert("更換成功！"); switchBox('box-login');
    }

    function go(id) {
        if(id === curId) return;
        if(!isLog && ['v-copy','v-func','v-demo','v-other'].includes(id)) return alert("請先登入");
        const c = document.getElementById(curId), n = document.getElementById(id);
        c.classList.remove('active'); c.classList.add('exit');
        n.style.display = 'flex'; setTimeout(() => n.classList.add('active'), 50);
        setTimeout(() => { c.style.display='none'; c.classList.remove('exit'); curId=id; }, 400);
        toggleM(false);
    }

    function toggleM(f) {
        const s = document.getElementById('sidebar');
        f === false ? s.classList.remove('open') : s.classList.toggle('open');
    }
</script>
</body>
</html>
