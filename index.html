<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雷歐終極版 V25</title>
    <style>
        :root { --p: #00ffcc; --v: #ffd700; --a: #ff4d4d; --card: #111; }
        * { cursor: none !important; box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        
        /* 游標 */
        #dot { position: fixed; width: 6px; height: 6px; background: var(--p); border-radius: 50%; pointer-events: none; z-index: 9999; }
        
        /* 導航欄 */
        .header { height: 60px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #333; position: relative; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; margin-right: 20px; }
        .title { font-weight: 900; letter-spacing: 1px; cursor: pointer; user-select: none; }

        /* 側邊欄 - 包含你圖片裡的所有功能 */
        .sidebar { position: fixed; left: -260px; top: 0; width: 250px; height: 100%; background: #080808; border-right: 2px solid var(--p); transition: 0.3s; z-index: 1000; padding-top: 70px; }
        .sidebar.open { left: 0; }
        .nav-link { padding: 16px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; opacity: 0.6; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { opacity: 1; background: rgba(0,255,204,0.1); color: var(--p); }

        /* 視圖區域 */
        .view { display: none; padding: 30px 20px; height: calc(100vh - 60px); overflow-y: auto; }
        .view.active { display: block; animation: show 0.3s ease; }
        @keyframes show { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* 卡片與輸入 */
        .card { background: var(--card); border: 1px solid #222; border-radius: 15px; padding: 25px; max-width: 400px; margin: 10px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; outline: none; }
        .btn { width: 100%; padding: 14px; border-radius: 8px; border: none; background: linear-gradient(135deg, #FF6B00, #FF9900); color: #fff; font-weight: bold; cursor: pointer; }
        .btn:active { transform: scale(0.98); }

        /* 提示 */
        #msg { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 25px; border-radius: 50px; border: 1px solid var(--p); transition: 0.4s; z-index: 10000; }
    </style>
</head>
<body onload="setup()">

<div id="dot"></div>
<div id="msg">提示訊息</div>

<header class="header">
    <div class="menu-btn" onclick="side()">☰</div>
    <div class="title" id="main-title">雷歐腳本中心</div>
</header>

<aside class="sidebar" id="sb">
    <div class="nav-link active" onclick="tab('v-auth')">🔐 核心驗證</div>
    <div class="nav-link" onclick="tab('v-info')">📢 公告中心</div>
    <div class="nav-link" onclick="tab('v-hub')">📋 腳本終端</div>
    <div class="nav-link" onclick="tab('v-chat')">💬 數位廣場</div>
    <div class="nav-link" onclick="tab('v-key')">💎 卡密激活</div>
    <div class="nav-link" onclick="tab('v-bug')">🐛 Bug 上報</div>
    <div id="admin-nav" class="nav-link" onclick="tab('v-admin')" style="display:none; color:var(--a); font-weight:bold;">🚨 管理總部</div>
</aside>

<main id="main-content">
    <div id="v-auth" class="view active">
        <div class="card" id="box-l">
            <h2 style="text-align:center;">登入系統</h2>
            <input type="text" id="li-u" placeholder="使用者名稱">
            <input type="password" id="li-p" placeholder="密碼">
            <div style="text-align:right; font-size:12px; margin-bottom:10px;">
                <span onclick="swap('box-r')" style="color:var(--p); cursor:pointer;">沒有帳號？點我註冊</span>
            </div>
            <button class="btn" onclick="doLogin()">登入</button>
        </div>
        <div class="card" id="box-r" style="display:none;">
            <h2 style="text-align:center;">註冊帳號</h2>
            <input type="text" id="re-u" placeholder="使用者名稱/Email">
            <input type="password" id="re-p" placeholder="設定密碼">
            <button class="btn" onclick="doReg()">註冊</button>
            <p onclick="swap('box-l')" style="text-align:center; color:var(--p); cursor:pointer; font-size:12px;">返回登入</p>
        </div>
        <div class="card" id="box-a" style="display:none;">
            <h2 style="text-align:center; color:var(--a);">管理員認證</h2>
            <input type="text" id="ad-u" placeholder="管理員名稱">
            <input type="password" id="ad-p" placeholder="認證密鑰">
            <button class="btn" style="background:var(--a)" onclick="doAdmin()">驗證進入</button>
        </div>
    </div>

    <div id="v-info" class="view"><div class="card"><h3>📢 公告</h3><p>所有功能已完全回歸！</p></div></div>
    
    <div id="v-hub" class="view">
        <div class="card">
            <h3>📋 腳本終端</h3>
            <p style="font-size:12px; opacity:0.7;">自動農場 V25.0</p>
            <button class="btn" onclick="toast('代碼已複製')">複製腳本</button>
        </div>
    </div>

    <div id="v-chat" class="view">
        <div class="card">
            <h3>💬 數位廣場</h3>
            <textarea id="msg-in" placeholder="發點彈幕吧..."></textarea>
            <button class="btn" onclick="toast('發送成功！')">發送消息</button>
        </div>
    </div>

    <div id="v-key" class="view">
        <div class="card" style="text-align:center;">
            <h3 style="color:var(--v)">💎 卡密激活</h3>
            <p style="font-size:12px;">輸入 12 位 VIP 卡密</p>
            <input id="key-in" placeholder="LEO-XXXX-XXXX" style="text-align:center;">
            <button class="btn" style="background:var(--v); color:#000;" onclick="doKey()">激活</button>
        </div>
    </div>

    <div id="v-bug" class="view">
        <div class="card">
            <h3>🐛 Bug 上報</h3>
            <textarea placeholder="描述問題..."></textarea>
            <button class="btn" onclick="toast('回報成功')">提交</button>
        </div>
    </div>

    <div id="v-admin" class="view">
        <div class="card">
            <h3 style="color:var(--a)">🚨 管理員控制台</h3>
            <button class="btn" onclick="makeKey()">生成 VIP 卡密</button>
            <div id="key-res" style="margin-top:15px; color:var(--v); font-family:monospace; text-align:center;"></div>
        </div>
    </div>
</main>

<script>
    let db = JSON.parse(localStorage.getItem('LEO_DB_V25')) || [];
    let user = null;

    // 游標
    window.onmousemove = e => { 
        const d = document.getElementById('dot');
        d.style.left = e.x+'px'; d.style.top = e.y+'px'; 
    };

    function setup() {
        // 雙擊標題進入管理員登入卡片
        document.getElementById('main-title').ondblclick = () => {
            swap('box-a');
            toast("管理員入口已開啟");
        };
    }

    function toast(t) {
        const m = document.getElementById('msg');
        m.innerText = t; m.style.bottom = '30px';
        setTimeout(() => m.style.bottom = '-60px', 2000);
    }

    function side() { document.getElementById('sb').classList.toggle('open'); }

    function swap(id) {
        ['box-l','box-r','box-a'].forEach(i => document.getElementById(i).style.display='none');
        document.getElementById(id).style.display='block';
    }

    function tab(id) {
        if(!user && id !== 'v-auth') return toast("請先登入帳號");
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(document.getElementById('sb').classList.contains('open')) side();
    }

    function doReg() {
        const u = document.getElementById('re-u').value, p = document.getElementById('re-p').value;
        if(!u || !p) return toast("請輸入完整內容");
        db.push({u, p, vip: false});
        localStorage.setItem('LEO_DB_V25', JSON.stringify(db));
        toast("註冊成功！");
        swap('box-l');
    }

    function doLogin() {
        const u = document.getElementById('li-u').value, p = document.getElementById('li-p').value;
        const f = db.find(x => x.u === u && x.p === p);
        if(f) { user = f; toast("登入成功，歡迎回來！"); tab('v-info'); } else toast("帳號密碼錯誤");
    }

    function doAdmin() {
        const u = document.getElementById('ad-u').value, p = document.getElementById('ad-p').value;
        if(u === "admin" && p === "LEO_888") {
            user = {u: "管理員", admin: true};
            document.getElementById('admin-nav').style.display = 'flex';
            toast("最高權限已驗證");
            tab('v-admin');
        } else toast("認證失敗");
    }

    function doKey() {
        const k = document.getElementById('key-in').value.toUpperCase();
        if(k.startsWith("VIP-LEO-")) { toast("VIP 激活成功！"); user.vip = true; }
        else toast("卡密無效或已被使用");
    }

    function makeKey() {
        const k = "VIP-LEO-" + Math.random().toString(36).substr(2, 6).toUpperCase();
        document.getElementById('key-res').innerText = k;
        navigator.clipboard.writeText(k);
        toast("卡密已複製");
    }
</script>
</body>
</html>
