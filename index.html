<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷歐腳本中心 v3.7 - 最終穩定版</title>
    <style>
        :root {
            --primary: #00ffcc;
            --admin-red: #ff4444;
            --bg: #0a0a0a;
            --sidebar-bg: #050505;
            --card-bg: #161616;
            --text: #ffffff;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; overflow-x: hidden; }

        /* 側邊欄 */
        .sidebar { 
            width: 240px; height: 100vh; background: var(--sidebar-bg); 
            border-right: 1px solid #333; position: fixed; left: 0; top: 0;
            transition: 0.3s ease; z-index: 1000; overflow-y: auto;
        }
        .sidebar.hidden { transform: translateX(-100%); }
        .sidebar-header { padding: 25px; text-align: center; color: var(--primary); font-weight: bold; font-size: 20px; border-bottom: 1px solid #222; }
        
        .nav-item { 
            padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px;
            opacity: 0.7; transition: 0.2s; border-left: 4px solid transparent; font-size: 14px;
        }
        .nav-item:hover, .nav-item.active { opacity: 1; background: rgba(0,255,204,0.1); border-left: 4px solid var(--primary); color: var(--primary); }
        .nav-admin { color: var(--admin-red); font-weight: bold; border-top: 1px solid #222; }

        /* 內容區 */
        .main-content { margin-left: 240px; width: calc(100% - 240px); padding: 25px; transition: 0.3s ease; min-height: 100vh; }
        .main-content.expanded { margin-left: 0; width: 100%; }

        /* UI 元件 */
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: var(--primary); color: #000; transition: 0.2s; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .btn-red { background: var(--admin-red); color: #fff; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; }

        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; }
        th { color: var(--primary); font-size: 13px; text-transform: uppercase; }

        /* 隱藏/顯示按鈕 */
        .toggle-btn { position: fixed; left: 15px; bottom: 15px; z-index: 1100; background: var(--primary); width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; font-size: 20px; box-shadow: 0 0 10px var(--primary); }

        /* 登入彈窗 */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(8px); }
        .login-box { background: var(--card-bg); padding: 35px; border-radius: 15px; width: 90%; max-width: 380px; border: 1px solid var(--primary); text-align: center; }

        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<button class="toggle-btn" onclick="toggleSidebar()">☰</button>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">LEO HUB v3.7</div>
    <div class="nav-item active" onclick="showView('v-creator')">🏠 脚本创作者</div>
    <div class="nav-item" onclick="showView('v-notice')">📢 公告系統</div>
    <div class="nav-item" onclick="showView('v-copy')">📜 脚本復制</div>
    <div class="nav-item" onclick="showView('v-pts-sys')">💰 積分系統</div>
    
    <div id="logged-in-menu" style="display:none;">
        <div class="nav-item" onclick="showView('v-draw')">🥚 抽獎系統</div>
    </div>

    <!-- 管理員專用選單 -->
    <div class="nav-item nav-admin" onclick="showView('v-admin-login')">🛡️ 管理員入口</div>
    <div id="admin-menu" style="display:none;">
        <div class="nav-item nav-admin" onclick="showView('v-mgr-data')">📊 平台數據統計</div>
        <div class="nav-item nav-admin" onclick="showView('v-mgr-notice')">✍️ 快捷公告系統</div>
        <div class="nav-item nav-admin" onclick="showView('v-mgr-keylist')">🗃️ 卡密管理系統</div>
        <div class="nav-item nav-admin" onclick="showView('v-mgr-user')">👥 用戶/封禁管理</div>
    </div>
</aside>

<main class="main-content" id="main-content">
    
    <!-- 1. 腳本創作者 -->
    <div id="v-creator" class="view active">
        <div class="card">
            <h2 style="color:var(--primary)">🎨 脚本创作者名單</h2>
            <p style="margin-top:15px;"><b>總負責人：</b>雷欧REO_ROBLOX</p>
            <p><b>技術支援：</b>雷欧REO_ROBLOX</p>
            <button class="btn" style="margin-top:20px; width:100%" onclick="toggleLogin(true)">開啟登入介面</button>
        </div>
    </div>

    <!-- 2. 公告系統 (用戶看) -->
    <div id="v-notice" class="view">
        <div class="card">
            <h2>📢 最新公告</h2>
            <div id="notice-display-list" style="margin-top:15px;"></div>
        </div>
    </div>

    <!-- 3. 腳本複製 -->
    <div id="v-copy" class="view">
        <div class="card">
            <h2>📜 脚本復制</h2>
            <textarea readonly id="script-area" style="height:100px; color:var(--primary); font-family:monospace;">loadstring(game:HttpGet("https://raw.githubusercontent.com/REO/main/script.lua"))()</textarea>
            <button class="btn" onclick="copyText()">複製腳本代碼</button>
        </div>
    </div>

    <!-- 4. 積分系統 -->
    <div id="v-pts-sys" class="view">
        <div class="card">
            <h2>💰 積分中心</h2>
            <h1 id="my-pts" style="font-size:48px; color:var(--primary); margin:15px 0;">0</h1>
            <button class="btn" onclick="dailySign()">📅 每日簽到 (+10)</button>
        </div>
    </div>

    <!-- 5. 抽獎系統 (登入後顯示) -->
    <div id="v-draw" class="view">
        <div class="card" style="text-align:center;">
            <h2>🥚 砸金蛋抽獎</h2>
            <div style="font-size:60px; margin:20px;">🥚 🥚 🥚</div>
            <button class="btn" onclick="alert('抽獎功能已就緒！')">點擊砸蛋</button>
        </div>
    </div>

    <!-- 管理員驗證 -->
    <div id="v-admin-login" class="view">
        <div class="card" style="max-width:400px; margin:100px auto;">
            <h2 style="color:var(--admin-red); text-align:center;">管理員驗證</h2>
            <input type="password" id="adm-pass" placeholder="輸入管理密鑰 (預設 REO888)">
            <button class="btn btn-red" style="width:100%" onclick="checkAdmin()">驗證並進入後台</button>
        </div>
    </div>

    <!-- 後台：數據統計 -->
    <div id="v-mgr-data" class="view">
        <div class="card">
            <h2>📊 平台數據統計</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:15px;">
                <div class="card" style="background:#222; text-align:center;"><h3>總用戶</h3><h1 id="count-u">0</h1></div>
                <div class="card" style="background:#222; text-align:center;"><h3>總卡密</h3><h1 id="count-k">0</h1></div>
            </div>
        </div>
    </div>

    <!-- 後台：快捷公告 (解決沒反應) -->
    <div id="v-mgr-notice" class="view">
        <div class="card">
            <h2>✍️ 公告發布</h2>
            <input type="text" id="new-notice-title" placeholder="公告標題">
            <textarea id="new-notice-content" placeholder="公告內容..."></textarea>
            <button class="btn" onclick="saveNotice()">發布公告</button>
        </div>
    </div>

    <!-- 後台：卡密管理 (解決沒反應) -->
    <div id="v-mgr-keylist" class="view">
        <div class="card">
            <h2>🔑 卡密生成與管理</h2>
            <div style="display:flex; gap:10px;">
                <input type="number" id="key-num" value="1" style="width:80px">
                <button class="btn" onclick="makeKeys()">批量生成</button>
            </div>
            <table>
                <thead><tr><th>卡密內容</th><th>狀態</th><th>操作</th></tr></thead>
                <tbody id="key-list-body"></tbody>
            </table>
        </div>
    </div>

    <!-- 後台：用戶管理 -->
    <div id="v-mgr-user" class="view">
        <div class="card">
            <h2>👥 用戶列表</h2>
            <table>
                <thead><tr><th>名稱</th><th>積分</th><th>權限</th></tr></thead>
                <tbody id="user-list-body"></tbody>
            </table>
        </div>
    </div>

</main>

<!-- 登入 UI 彈窗 -->
<div class="login-overlay" id="login-ui">
    <div class="login-box">
        <h2 style="color:var(--primary)">User Login</h2>
        <input type="text" id="user-u" placeholder="用戶名">
        <input type="password" id="user-p" placeholder="密碼">
        <button class="btn" style="width:100%; margin-top:15px;" onclick="handleLogin()">立即登入</button>
        <p style="margin-top:15px; color:#666; cursor:pointer;" onclick="toggleLogin(false)">取消返回</p>
    </div>
</div>

<script>
    // 1. 數據初始化[span_1](start_span)[span_1](end_span)
    let db = {
        keys: JSON.parse(localStorage.getItem('REO_KEYS') || '[]'),
        notices: JSON.parse(localStorage.getItem('REO_NOTICES') || '[]'),
        users: JSON.parse(localStorage.getItem('REO_USERS') || '[{"name":"測試員","pts":100}]')
    };

    // 2. 側邊欄切換
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('hidden');
        document.getElementById('main-content').classList.toggle('expanded');
    }

    function toggleLogin(show) {
        document.getElementById('login-ui').style.display = show ? 'flex' : 'none';
    }

    // 3. 核心視圖切換 (確保所有管理功能被調用)[span_2](start_span)[span_2](end_span)
    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(v => v.classList.remove('active'));
        
        const target = document.getElementById(id);
        if(target) {
            target.classList.add('active');
            // 觸發對應的刷新函數[span_3](start_span)[span_3](end_span)
            if(id === 'v-notice') renderNotices();
            if(id === 'v-mgr-keylist') renderKeyTable();
            if(id === 'v-mgr-data') refreshStats();
            if(id === 'v-mgr-user') renderUserTable();
        }
    }

    // 4. 管理員功能[span_4](start_span)[span_4](end_span)
    function checkAdmin() {
        const pass = document.getElementById('adm-pass').value;
        if(pass === "REO888") {
            document.getElementById('admin-menu').style.display = 'block';
            alert("管理權限已解鎖");
            showView('v-mgr-data');
        } else {
            alert("密鑰錯誤！");
        }
    }

    function refreshStats() {
        document.getElementById('count-u').innerText = db.users.length;
        document.getElementById('count-k').innerText = db.keys.length;
    }

    function makeKeys() {
        const n = document.getElementById('key-num').value;
        for(let i=0; i<n; i++) {
            const k = "REO_" + Math.random().toString(36).substring(2,10).toUpperCase();
            db.keys.push({ code: k, status: '未使用' });
        }
        saveDB();
        renderKeyTable();
    }

    function renderKeyTable() {
        const body = document.getElementById('key-list-body');
        body.innerHTML = db.keys.map((k, i) => `
            <tr>
                <td>${k.code}</td>
                <td style="color:lime">${k.status}</td>
                <td><button onclick="deleteKey(${i})" style="color:red; background:none; border:none; cursor:pointer;">刪除</button></td>
            </tr>
        `).join('');
    }

    function deleteKey(i) {
        db.keys.splice(i, 1);
        saveDB();
        renderKeyTable();
    }

    // 5. 公告功能[span_5](start_span)[span_5](end_span)
    function saveNotice() {
        const t = document.getElementById('new-notice-title').value;
        const c = document.getElementById('new-notice-content').value;
        if(!t || !c) return alert("請輸入內容");
        db.notices.unshift({ title: t, content: c, time: new Date().toLocaleString() });
        saveDB();
        alert("公告已發布");
        showView('v-notice');
    }

    function renderNotices() {
        const container = document.getElementById('notice-display-list');
        if(db.notices.length === 0) {
            container.innerHTML = "<p style='color:#666'>目前沒有任何公告。</p>";
            return;
        }
        container.innerHTML = db.notices.map(n => `
            <div class="card" style="background:#222; border-left:4px solid var(--primary)">
                <h3>${n.title}</h3>
                <p style="margin:10px 0; font-size:14px; opacity:0.8;">${n.content}</p>
                <small style="color:#666">${n.time}</small>
            </div>
        `).join('');
    }

    // 6. 用戶功能
    function handleLogin() {
        const u = document.getElementById('user-u').value;
        if(u) {
            document.getElementById('logged-in-menu').style.display = 'block';
            toggleLogin(false);
            alert("歡迎回來：" + u);
        }
    }

    function dailySign() {
        let p = parseInt(document.getElementById('my-pts').innerText);
        p += 10;
        document.getElementById('my-pts').innerText = p;
        alert("簽到成功！+10 積分");
    }

    function copyText() {
        const area = document.getElementById('script-area');
        area.select();
        document.execCommand('copy');
        alert("腳本代碼已複製到剪貼簿！");
    }

    function renderUserTable() {
        document.getElementById('user-list-body').innerHTML = db.users.map(u => `
            <tr><td>${u.name}</td><td>${u.pts}</td><td>普通用戶</td></tr>
        `).join('');
    }

    function saveDB() {
        localStorage.setItem('REO_KEYS', JSON.stringify(db.keys));
        localStorage.setItem('REO_NOTICES', JSON.stringify(db.notices));
        localStorage.setItem('REO_USERS', JSON.stringify(db.users));
    }

    // 初始載入
    window.onload = () => {
        renderNotices();
    };
</script>

</body>
</html>
