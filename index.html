<!DOCTYPE html>
<html lang="zh-TW" oncontextmenu="return false">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEO HUB | V19.0 SYSTEM UPDATED</title>
    <style>
        :root { --primary: #00ffcc; --bg: #050505; --glass: rgba(255,255,255,0.06); --admin: #ff4d4d; --gold: #ffd700; --warn: #ff9900; --shadow: 0 0 20px rgba(0,255,204,0.3); }
        * { cursor: none !important; box-sizing: border-box; -webkit-tap-highlight-color: transparent; } 
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #fff; background: #000; }
        
        /* 系統背景 */
        #canvas-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.5; }
        #cursor-dot { position: fixed; width: 6px; height: 6px; background: var(--primary); border-radius: 50%; pointer-events: none; z-index: 10000; }

        /* 動態系統標籤 */
        .upd-tag { color: var(--primary); font-size: 10px; font-weight: 900; background: rgba(0,255,204,0.15); padding: 3px 10px; border-radius: 5px; animation: glow 2s infinite; border: 1px solid var(--primary); text-transform: uppercase; }
        @keyframes glow { 0%, 100% { opacity: 0.5; box-shadow: 0 0 5px var(--primary); } 50% { opacity: 1; box-shadow: 0 0 20px var(--primary); } }

        /* 介面提升 */
        .glass { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: var(--primary); color: #000; padding: 12px; border-radius: 10px; border: none; font-weight: 900; width: 100%; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
        .btn:active { transform: scale(0.95); }
        .btn-gold { background: linear-gradient(45deg, var(--gold), #ff8c00); color: #000; }
        input, textarea, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.7); color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,255,204,0.2); }

        /* 導航 */
        .header { position: fixed; top: 0; width: 100%; height: 65px; display: flex; align-items: center; padding: 0 25px; z-index: 1000; background: rgba(0,0,0,0.85); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar { position: fixed; left: -280px; top: 0; width: 260px; height: 100%; padding-top: 90px; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 2000; background: rgba(5,5,5,0.98); border-right: 1px solid var(--primary); }
        .sidebar.active { left: 0; }
        .nav-item { padding: 18px 30px; opacity: 0.6; transition: 0.3s; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .nav-item.active { opacity: 1; color: var(--primary); background: rgba(0,255,204,0.08); border-left: 4px solid var(--primary); }

        /* 視圖切換 */
        .view { display: none; padding: 90px 25px 40px; height: 100vh; overflow-y: auto; scroll-behavior: smooth; }
        .view.active { display: block; animation: viewIn 0.5s ease; }
        @keyframes viewIn { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }

        /* 內容卡片 */
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 18px; margin-bottom: 20px; }
        .anno-card { border-left: 4px solid var(--gold); background: rgba(255,215,0,0.05); }
        .vip-name { color: var(--gold); font-weight: 900; text-shadow: 0 0 10px var(--gold); }
        .adm-badge { background: var(--admin); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 5px; margin-left: 8px; vertical-align: middle; }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 15px 40px; border-radius: 50px; font-weight: 900; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 99999; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body onload="init()">

<canvas id="canvas-bg"></canvas>
<div id="cursor-dot"></div>

<header class="header">
    <div onclick="toggleMenu()" style="cursor:pointer; font-size:24px;">☰</div>
    <div style="margin-left:20px; font-weight:900; flex-grow:1; font-size:18px; letter-spacing:1px;">LEO HUB <span class="upd-tag" id="sys-status">系統已更新</span></div>
</header>

<aside class="sidebar" id="sb">
    <div class="nav-item active" onclick="go('v-auth')">🔐 核心驗證</div>
    <div class="nav-item" onclick="go('v-home')">📢 公告中心</div>
    <div class="nav-item" onclick="go('v-copy')">📋 腳本終端</div>
    <div class="nav-item" onclick="go('v-forum')">💬 數位廣場</div>
    <div class="nav-item" onclick="go('v-key')">💎 卡密激活</div>
    <div class="nav-item" onclick="go('v-bug')">🐛 Bug 上報</div>
    <div id="adm-nav" class="nav-item" onclick="go('v-admin')" style="display:none; color:var(--admin); font-weight:bold;">🚨 最高控制台</div>
</aside>

<main>
    <div id="v-auth" class="view active">
        <div class="glass" style="max-width:380px; margin:auto; padding:40px;">
            <h2 style="text-align:center; letter-spacing:3px; margin-bottom:30px;">ACCESS DENIED</h2>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button class="btn" onclick="setAuth('user')">USER</button>
                <button class="btn" style="background:#222; color:#fff;" onclick="setAuth('admin')">ADMIN</button>
            </div>
            <input id="ipt-u" placeholder="USERNAME (_)">
            <input type="password" id="ipt-p" placeholder="PASSWORD (_)">
            <input type="password" id="ipt-p2" placeholder="CONFIRM PASS" style="display:none;">
            <button class="btn" onclick="handleAuth()">驗證身份</button>
            <p onclick="toggleReg()" style="text-align:center; font-size:11px; color:var(--primary); cursor:pointer; margin-top:25px; opacity:0.6;">還沒有帳號？點此註冊</p>
        </div>
    </div>

    <div id="v-home" class="view">
        <div style="max-width:600px; margin:auto;">
            <div class="glass" style="padding:30px; text-align:center; margin-bottom:30px;">
                <div id="my-avatar" style="font-size:50px;">👤</div>
                <h2 id="my-name" style="margin:10px 0;">GUEST</h2>
                <div id="my-info" style="font-size:12px; opacity:0.5;">等待驗證...</div>
            </div>
            <div id="anno-list"></div>
        </div>
    </div>

    <div id="v-copy" class="view">
        <div style="max-width:600px; margin:auto;" id="s-list"></div>
    </div>

    <div id="v-forum" class="view">
        <div style="max-width:700px; margin:auto;">
            <div class="glass" style="padding:25px; margin-bottom:25px;">
                <textarea id="f-content" placeholder="分享一些腳本心得..."></textarea>
                <button class="btn" onclick="postForum()">發布動態</button>
            </div>
            <div id="f-list"></div>
        </div>
    </div>

    <div id="v-key" class="view">
        <div class="glass" style="max-width:450px; margin:auto; padding:40px; text-align:center;">
            <h3 style="color:var(--gold); margin-bottom:10px;">💎 卡密兌換中心</h3>
            <p style="font-size:12px; opacity:0.6; margin-bottom:30px;">輸入 12 位卡密。提示：系統不區分 0 和 O。</p>
            <input id="key-input" style="text-align:center; font-size:20px; letter-spacing:2px; border:1px solid var(--gold);" placeholder="LEO-XXXX-XXXX">
            <button class="btn btn-gold" onclick="redeemKey()">立即激活權限</button>
        </div>
    </div>

    <div id="v-bug" class="view">
        <div class="glass" style="max-width:500px; margin:auto; padding:35px;">
            <h3>🐛 Bug / 漏洞回報</h3>
            <p style="font-size:11px; opacity:0.5;">您的反饋能讓系統更完美。</p>
            <select id="bug-type">
                <option>腳本運行報錯</option>
                <option>網頁功能失效</option>
                <option>卡密激活失敗</option>
                <option>其他建議</option>
            </select>
            <textarea id="bug-desc" placeholder="請描述 Bug 出現的過程..."></textarea>
            <button class="btn" onclick="submitBug()">提交回報</button>
        </div>
    </div>

    <div id="v-admin" class="view">
        <div style="max-width:850px; margin:auto;">
            <h2 style="color:var(--admin); letter-spacing:2px;">🚨 SUPREME OVERLORD PANEL</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin:25px 0;">
                <div class="glass" style="padding:20px;">
                    <h4>發布全局公告</h4>
                    <textarea id="adm-anno" placeholder="輸入公告內容..."></textarea>
                    <button class="btn" style="background:var(--gold); color:#000;" onclick="addAnno()">確認發布</button>
                </div>
                <div class="glass" style="padding:20px;">
                    <h4>生成新卡密 (本地)</h4>
                    <select id="adm-key-type">
                        <option value="VIP">永久 VIP 權限</option>
                        <option value="500">500 積分</option>
                    </select>
                    <button class="btn" onclick="genKey()">生成並複製</button>
                    <p id="gen-out" style="font-family:monospace; margin-top:10px; color:var(--gold);"></p>
                </div>
            </div>
            <div class="glass" style="padding:20px; margin-bottom:20px;">
                <h4>用戶 & 封禁控制</h4>
                <div id="adm-users" style="max-height:300px; overflow-y:auto;"></div>
            </div>
            <div class="glass" style="padding:20px;">
                <h4>收到 Bug 報告 (<span id="bug-count">0</span>)</h4>
                <div id="adm-bugs" style="max-height:200px; overflow-y:auto; font-size:12px;"></div>
            </div>
        </div>
    </div>
</main>

<div id="toast">SYSTEM UPDATED</div>

<script>
    /* ==========================================
       🔑 全局卡密庫 (在此處手動添加互通卡密)
       格式：{ code: "卡密內容", type: "VIP或積分數字" }
       ========================================== */
    const GLOBAL_VALID_KEYS = [
        { code: "LEO-TEST-8888", type: "VIP" },
        { code: "LEO-GIFT-5000", type: "500" },
        // 你在管理員面板生成後，可以把卡密貼在這裡並推送到 GitHub
    ];

    // 初始化與背景
    const canvas = document.getElementById('canvas-bg');
    const c = canvas.getContext('2d');
    window.addEventListener('mousemove', e => {
        document.getElementById('cursor-dot').style.left = e.x + 'px';
        document.getElementById('cursor-dot').style.top = e.y + 'px';
    });

    let USERS = JSON.parse(localStorage.getItem('L_V19_U')) || [];
    let SCRIPTS = JSON.parse(localStorage.getItem('L_V19_S')) || [{n:"飛天腳本", c:"loadstring(game:HttpGet('...'))()"}];
    let POSTS = JSON.parse(localStorage.getItem('L_V19_P')) || [];
    let ANNOS = JSON.parse(localStorage.getItem('L_V19_A')) || [{t:"歡迎來到 LEO HUB V19.0！系統已全面更新。"}];
    let BUGS = JSON.parse(localStorage.getItem('L_V19_B')) || [];
    let USED_KEYS = JSON.parse(localStorage.getItem('L_V19_UK')) || [];

    let sess = null, mode = 'user', isReg = false;

    function init() { canvas.width=innerWidth; canvas.height=innerHeight; }
    function save() {
        localStorage.setItem('L_V19_U', JSON.stringify(USERS));
        localStorage.setItem('L_V19_S', JSON.stringify(SCRIPTS));
        localStorage.setItem('L_V19_P', JSON.stringify(POSTS));
        localStorage.setItem('L_V19_A', JSON.stringify(ANNOS));
        localStorage.setItem('L_V19_B', JSON.stringify(BUGS));
        localStorage.setItem('L_V19_UK', JSON.stringify(USED_KEYS));
    }

    function msg(t) { const o=document.getElementById('toast'); o.innerText=t; o.style.bottom='40px'; setTimeout(()=>o.style.bottom='-100px',2500); }
    function toggleMenu() { document.getElementById('sb').classList.toggle('active'); }

    function go(id) {
        if(id !== 'v-auth' && !sess) return msg("拒絕訪問：請先驗證");
        document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        toggleMenu();
        if(id==='v-home') drawAnnos();
        if(id==='v-copy') drawS();
        if(id==='v-forum') drawForum();
        if(id==='v-admin') drawAdmin();
    }

    // 驗證
    function setAuth(m) { mode=m; isReg=false; msg("切換為 " + m); }
    function toggleReg() { isReg=!isReg; document.getElementById('ipt-p2').style.display=isReg?'block':'none'; }
    
    function handleAuth() {
        const u=document.getElementById('ipt-u').value.trim(), p=document.getElementById('ipt-p').value.trim();
        if(mode==='admin') {
            if(u==='admin' && p==='LEO_888') { sess={u:"LEO", r:"ADMIN", t:"總管理員", isVip:true, pts:9999}; loginOk(); }
            else msg("密鑰錯誤"); return;
        }
        if(!u.includes('_')||!p.includes('_')) return msg("帳密須包含一個 _");
        if(isReg) {
            if(USERS.find(x=>x.u===u)) return msg("用戶已存在");
            USERS.push({u,p,r:"USER",t:"普通用戶",pts:0,muted:false,banned:false,isVip:false}); save(); msg("註冊成功"); toggleReg();
        } else {
            const f=USERS.find(x=>x.u===u && x.p===p);
            if(f) { if(f.banned) return msg("帳號已被永久封禁"); sess=f; loginOk(); } else msg("驗證失敗");
        }
    }

    function loginOk() {
        updateProfile();
        if(sess.r==='ADMIN') document.getElementById('adm-nav').style.display='block';
        msg("系統已更新：歡迎回來"); go('v-home');
    }

    function updateProfile() {
        document.getElementById('my-name').innerText = sess.u;
        document.getElementById('my-name').className = sess.isVip ? 'vip-name' : '';
        document.getElementById('my-info').innerText = (sess.isVip?'VIP 💎':'普通') + " | 積分: " + sess.pts;
    }

    // 卡密系統 (修復核心)
    function redeemKey() {
        let input = document.getElementById('key-input').value.trim().toUpperCase().replace(/O/g, '0');
        if(!input) return;

        // 檢查是否已經被此瀏覽器使用過
        if(USED_KEYS.includes(input)) return msg("卡密無效或已被使用");

        // 檢查全局卡密庫
        const keyData = GLOBAL_VALID_KEYS.find(k => k.code.toUpperCase().replace(/O/g, '0') === input);
        
        if(keyData) {
            if(keyData.type === "VIP") {
                sess.isVip = true; msg("激活成功：永久 VIP 已解鎖！");
            } else {
                sess.pts += parseInt(keyData.type); msg(`激活成功：獲得 ${keyData.type} 積分！`);
            }
            USED_KEYS.push(input);
            save(); updateProfile();
            document.getElementById('key-input').value = "";
        } else {
            msg("卡密錯誤：系統無法識別");
        }
    }

    // 內容渲染
    function drawAnnos() {
        document.getElementById('anno-list').innerHTML = ANNOS.slice().reverse().map(a=>`<div class="card anno-card">📢 ${a.t}</div>`).join('');
    }

    function drawForum() {
        document.getElementById('f-list').innerHTML = POSTS.slice().reverse().map((p,i)=>`
            <div class="card">
                <div style="font-size:12px; margin-bottom:8px;">
                    <span class="${p.isVip?'vip-name':''}">${p.u}</span>
                    ${p.r==='ADMIN'?'<span class="adm-badge">STAFF</span>':''}
                </div>
                <div style="opacity:0.9;">${p.m}</div>
                ${sess.r==='ADMIN' ? `
                    <div style="margin-top:12px; border-top:1px solid #333; padding-top:8px; display:flex; gap:15px;">
                        <button onclick="admAct('del',${POSTS.length-1-i})" style="color:var(--admin); background:none; border:none; font-size:11px;">刪除貼文</button>
                        <button onclick="admAct('mute','${p.u}')" style="color:var(--warn); background:none; border:none; font-size:11px;">禁言用戶</button>
                    </div>
                ` : ''}
            </div>
        `).join('');
    }

    function postForum() {
        if(sess.muted) return msg("你已被禁言");
        const m = document.getElementById('f-content').value; if(!m) return;
        POSTS.push({u:sess.u, r:sess.r, m, isVip:sess.isVip}); save(); drawForum();
        document.getElementById('f-content').value=""; msg("廣播發布成功");
    }

    function submitBug() {
        const desc = document.getElementById('bug-desc').value; if(!desc) return;
        BUGS.push({u:sess.u, type:document.getElementById('bug-type').value, desc}); save();
        document.getElementById('bug-desc').value=""; msg("回報已提交至管理員");
    }

    // 管理員功能
    function genKey() {
        const type = document.getElementById('adm-key-type').value;
        const code = "LEO-" + Math.random().toString(36).substr(2, 4).toUpperCase() + "-" + Math.random().toString(36).substr(2, 4).toUpperCase();
        document.getElementById('gen-out').innerText = code;
        navigator.clipboard.writeText(`{ code: "${code}", type: "${type}" },`);
        msg("卡密已複製，請將其貼入腳本 GLOBAL_VALID_KEYS 中");
    }

    function drawAdmin() {
        document.getElementById('bug-count').innerText = BUGS.length;
        document.getElementById('adm-users').innerHTML = USERS.map((u,i)=>`
            <div style="font-size:12px; padding:10px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
                <span>${u.u} [${u.isVip?'VIP':''}]</span>
                <div>
                    <button class="btn" style="width:auto; padding:5px 10px; font-size:10px;" onclick="admUser(${i},'ban')">封禁</button>
                </div>
            </div>
        `).join('');
        document.getElementById('adm-bugs').innerHTML = BUGS.map(b=>`<div>[${b.type}] ${b.u}: ${b.desc}</div>`).join('<hr style="border:none;border-top:1px solid #222">');
    }

    function admAct(act, val) {
        if(act==='del') POSTS.splice(val,1);
        if(act==='mute') { const u=USERS.find(x=>x.u===val); if(u) u.muted=true; }
        save(); drawForum(); msg("操作已執行");
    }

    function admUser(i, act) {
        if(act==='ban') { USERS[i].banned=true; msg("用戶已永久封鎖"); }
        save(); drawAdmin();
    }

    function addAnno() {
        const t = document.getElementById('adm-anno').value; if(!t) return;
        ANNOS.push({t}); save(); drawAnnos();
        document.getElementById('adm-anno').value=""; msg("公告已發布");
    }

    function drawS() {
        document.getElementById('s-list').innerHTML = SCRIPTS.map(s=>`
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <b>${s.n}</b>
                <button onclick="copy('${btoa(s.c)}')" class="btn" style="width:80px; font-size:11px;">複製代碼</button>
            </div>
        `).join('');
    }
    function copy(b) { navigator.clipboard.writeText(atob(b)); msg("系統已更新：腳本複製成功"); }
</script>
</body>
</html>
