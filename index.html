<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KG COMMAND CENTER | LEOREO</title>
    <style>
        :root { --main: #00ffcc; --bg: #000; --card: rgba(10,10,10,0.95); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* 全網公告與加載樣式保持一致 */
        .global-notice { position: fixed; top: 0; width: 100%; background: rgba(0,255,204,0.15); backdrop-filter: blur(15px); border-bottom: 1px solid var(--main); padding: 10px; z-index: 9000; font-size: 13px; color: var(--main); display: flex; align-items: center; justify-content: center; }
        .live-dot { width: 7px; height: 7px; background: #f00; border-radius: 50%; margin-right: 10px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        #loader { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 1s; }
        .load-logo { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--main); box-shadow: 0 0 30px var(--main); }
        
        canvas { position: fixed; inset: 0; z-index: -1; }

        .container { position: relative; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .page { position: absolute; width: 90%; max-width: 420px; opacity: 0; pointer-events: none; transition: 0.5s; transform: scale(0.9); }
        .page.active { opacity: 1; pointer-events: auto; transform: scale(1); }
        .card { background: var(--card); border-radius: 30px; border: 1px solid rgba(0,255,204,0.3); padding: 35px; backdrop-filter: blur(25px); text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }

        /* 管理員指揮中心 */
        #admin-panel { display: none; position: fixed; inset: 0; background: #050505; z-index: 9500; padding: 25px; overflow-y: auto; font-family: monospace; }
        .admin-nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--main); padding-bottom: 15px; margin-bottom: 25px; }

        .kg-logo { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--main); margin-bottom: 20px; cursor: pointer; }
        input, select { width: 100%; padding: 16px; margin: 10px 0; border-radius: 15px; border: 1px solid #333; background: #000; color: var(--main); font-size: 16px; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--main); color: #000; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }

        .nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; background: rgba(255,255,255,0.05); backdrop-filter: blur(30px); border-radius: 25px; display: flex; padding: 7px; border: 1px solid rgba(255,255,255,0.1); z-index: 8000; }
        .nav-item { flex: 1; padding: 12px; text-align: center; font-size: 13px; color: #666; cursor: pointer; }
        .nav-item.active { color: var(--main); }
    </style>
</head>
<body>

<div class="global-notice"><div class="live-dot"></div><span id="cloud-notice">📡 指令集同步中...</span></div>

<div id="loader">
    <img src="https://telegra.ph/file/0c3260c675339d675685a.jpg" class="load-logo">
    <div style="margin-top:20px; color:var(--main); letter-spacing:3px;">KG SUPREME BOOTING...</div>
</div>

<canvas id="canvas"></canvas>

<div class="container">
    <div class="page active" id="pg-home">
        <div class="card">
            <img src="https://telegra.ph/file/0c3260c675339d675685a.jpg" class="kg-logo" id="admin-trigger">
            <div id="maint-msg" style="display:none; color:#ff4444; font-weight:bold; margin-bottom:10px;">🔴 維護中</div>
            <select id="sType"><option value="f">【核心】免費通用版本</option></select>
            <input type="text" id="iKey" placeholder="請輸入授權碼">
            <button class="btn" onclick="verify()">驗證並注入腳本</button>
            <div style="font-size:10px; color:#222; margin-top:20px;">COMMANDER: LEOREOROBLOX</div>
        </div>
    </div>
    </div>

<div id="admin-login" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:9998; flex-direction:column; justify-content:center; align-items:center; padding:20px;">
    <div class="card" style="width:100%;">
        <h3 style="color:var(--main)">指揮官登入</h3>
        <input type="text" id="adm-user" placeholder="使用者名稱">
        <input type="password" id="adm-pass" placeholder="管理密碼">
        <button class="btn" onclick="checkAuth()">驗證權限</button>
        <button class="btn" style="background:none; color:#555;" onclick="closeLogin()">取消</button>
    </div>
</div>

<div id="admin-panel">
    <div class="admin-nav">
        <span style="color:var(--main)">ADMIN: LeoReoRoblox</span>
        <button onclick="exitAdmin()" style="background:none; border:1px solid red; color:red; border-radius:5px;">退出視角</button>
    </div>
    <div class="card" style="width:100%; text-align:left;">
        <label>1. 全網公告修改：</label>
        <input type="text" id="adm-notice-input" placeholder="新公告內容...">
        <button class="btn" onclick="updateNoticeLocal()">同步全網</button>
        <button class="btn" style="margin-top:20px; background:orange;" onclick="toggleMaint()">切換維護狀態</button>
        <button class="btn" style="margin-top:20px; background:#333;" onclick="forgetMe()">重置 IP 記憶</button>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="nav('home',0)">主機</div>
    <div class="nav-item" onclick="nav('script',1)">核心</div>
    <div class="nav-item" onclick="nav('site',2)">系統</div>
    <div class="nav-item" onclick="nav('contact',3)">聯絡</div>
</nav>

<script>
    // 加載動畫
    setTimeout(() => { document.getElementById('loader').style.opacity = '0'; setTimeout(()=>document.getElementById('loader').style.display='none', 1000); }, 3000);

    // 背景粒子
    const cv = document.getElementById('canvas'); const ct = cv.getContext('2d'); let ps = [];
    function rs() { cv.width = window.innerWidth; cv.height = window.innerHeight; } window.onresize = rs; rs();
    for(let i=0; i<30; i++) ps.push({x:Math.random()*cv.width, y:Math.random()*cv.height, s:Math.random()+0.2});
    function lp() { ct.clearRect(0,0,cv.width,cv.height); ct.fillStyle = '#00ffcc22'; ps.forEach(p=>{p.y-=p.s; if(p.y<0)p.y=cv.height; ct.beginPath(); ct.arc(p.x,p.y,1,0,Math.PI*2); ct.fill();}); requestAnimationFrame(lp); } lp();

    // 權限驗證
    let longPress;
    const trigger = document.getElementById('admin-trigger');
    trigger.onmousedown = trigger.ontouchstart = () => { longPress = setTimeout(showLogin, 2000); };
    trigger.onmouseup = trigger.ontouchend = () => { clearTimeout(longPress); };

    function showLogin() { 
        if(localStorage.getItem('isKGAdmin') === 'true') { openAdmin(); } 
        else { document.getElementById('admin-login').style.display = 'flex'; }
    }
    function closeLogin() { document.getElementById('admin-login').style.display = 'none'; }

    function checkAuth() {
        const u = document.getElementById('adm-user').value;
        const p = document.getElementById('adm-pass').value;
        if(u === 'LeoReoRoblox' && p === 'KGscriptWEB:admin') {
            localStorage.setItem('isKGAdmin', 'true');
            closeLogin();
            openAdmin();
        } else { alert('身分驗證失敗，權限不足。'); }
    }

    function openAdmin() { document.getElementById('admin-panel').style.display = 'block'; }
    function exitAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    function forgetMe() { localStorage.removeItem('isKGAdmin'); location.reload(); }

    function updateNoticeLocal() {
        const t = document.getElementById('adm-notice-input').value;
        if(t) document.getElementById('cloud-notice').innerText = t;
    }

    let isMaint = false;
    function toggleMaint() {
        isMaint = !isMaint;
        document.getElementById('maint-msg').style.display = isMaint ? 'block' : 'none';
        alert(isMaint ? '全網維護已開啟' : '全網維護已關閉');
    }

    function nav(p, i) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById('pg-'+p).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelectorAll('.nav-item')[i].classList.add('active');
    }
    function verify() { if(isMaint) { alert('系統維護中'); } else { alert('驗證中...'); } }
</script>
</body>
</html>
