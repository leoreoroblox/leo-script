<!DOCTYPE html>
<html lang="zh-TW" oncontextmenu="return false" onselectstart="return false" oncopy="return false">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEO SCRIPT | 防破解旗艦版</title>
    <style>
        /* 保持原有的極致視覺樣式 */
        :root { --primary: #00ffcc; --bg-grad: linear-gradient(125deg, #000, #0a1128, #1a0a2e, #000); }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; color: #fff; background: var(--bg-grad); background-size: 400% 400%; animation: flow 15s infinite ease; -webkit-user-select: none; user-select: none; }
        @keyframes flow { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }
        
        canvas#particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        
        /* 毛玻璃與 UI 框架 */
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; }
        .header { position: fixed; top: 0; width: 100%; height: 60px; display: flex; align-items: center; padding: 0 20px; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar { position: fixed; left: -280px; top: 0; width: 260px; height: 100%; padding-top: 80px; transition: 0.5s; z-index: 90; }
        .sidebar.active { left: 0; }
        
        .view { display: none; padding: 80px 20px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 卡片與按鈕 */
        .script-card { display: flex; justify-content: space-between; align-items: center; padding: 18px; margin-bottom: 12px; transition: 0.3s; }
        .btn-prime { background: var(--primary); color: #000; padding: 10px 20px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .btn-prime:active { transform: scale(0.9); }

        #loader { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; }
        .progress-bar { width: 200px; height: 2px; background: #111; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary); transition: 0.1s; }

        #toast { position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 12px 25px; border-radius: 50px; font-weight: bold; transition: 0.4s; z-index: 1000; }
    </style>
</head>
<body>

<canvas id="particles"></canvas>

<div id="loader">
    <div style="letter-spacing: 8px; font-weight: 900; color: var(--primary);">LEO SYSTEM</div>
    <div class="progress-bar"><div class="progress-fill" id="lp"></div></div>
</div>

<header class="header glass">
    <div id="menu-btn" style="cursor:pointer; font-size: 20px;">☰</div>
    <div style="margin-left:15px; font-weight: 900; letter-spacing:1px;">LEO SCRIPT <span style="font-size:10px; opacity:0.4;">SECURE MODE</span></div>
</header>

<aside class="sidebar glass" id="sb">
    <div style="padding: 20px 25px; font-size: 14px; opacity: 0.6;">功能菜單</div>
    <div class="nav-item" onclick="nv('v1')" style="padding: 15px 25px; cursor:pointer;">📢 系統公告</div>
    <div class="nav-item" id="nav-scripts" onclick="nv('v2')" style="padding: 15px 25px; cursor:pointer; opacity: 0.3;">🔒 腳本列表 (鎖定)</div>
</aside>

<main>
    <div id="v1" class="view active">
        <div class="glass" style="max-width:380px; margin: 40px auto; padding: 30px; text-align: center;">
            <h3>身份驗證</h3>
            <input type="text" id="user" placeholder="輸入用戶名" style="width:100%; padding:12px; margin: 20px 0; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.2); color:#fff; outline:none;">
            <button class="btn-prime" style="width:100%;" onclick="doLogin()">解鎖腳本</button>
        </div>
    </div>

    <div id="v2" class="view">
        <div style="max-width:500px; margin:auto;" id="script-list"></div>
    </div>
</main>

<div id="toast">操作成功</div>

<script>
    /**
     * --- 核心安全防護模組 (防破解) ---
     */
    (function() {
        // 1. 無限 Debugger 陷阱：檢測控制台
        function antiDebug() {
            function detector() {
                try {
                    (function() {
                        (function() {
                            debugger;
                        }).apply('run');
                    }).apply('run');
                } catch (e) {}
            }
            setInterval(detector, 100);
        }
        antiDebug();

        // 2. 禁用快捷鍵
        window.addEventListener('keydown', function(e) {
            // F12, Ctrl+Shift+I, Ctrl+U, Ctrl+S
            if (e.keyCode === 123 || 
               (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || 
               (e.ctrlKey && e.keyCode === 85) || 
               (e.ctrlKey && e.keyCode === 83)) {
                e.preventDefault();
                return false;
            }
        });

        // 3. 控制台清空與反爬取
        setInterval(function() {
            console.clear();
            console.log("%c雷歐腳本安全防護：未授權操作已記錄", "color:red; font-size:20px; font-weight:bold;");
        }, 1000);
    })();

    /**
     * --- 核心業務邏輯 (混淆與功能) ---
     */
    let logged = false;
    // 腳本數據加密存儲 (Base64)
    const db = [
        {n: "墨水遊戲漢化", c: "bG9hZHN0cmluZyhkYXRhKQ=="},
        {n: "最新皮腳本", c: "bG9hZHN0cmluZyhkYXRhKQ=="},
        {n: "TX-Pro 縫合", c: "bG9hZHN0cmluZyhkYXRhKQ=="}
    ];

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.bottom = '30px';
        setTimeout(() => t.style.bottom = '-80px', 2000);
    }

    function doLogin() {
        const u = document.getElementById('user').value;
        if(u.trim().length < 1) return showToast("請輸入用戶名");
        logged = true;
        document.getElementById('nav-scripts').style.opacity = "1";
        document.getElementById('nav-scripts').innerText = "⚡ 腳本列表";
        showToast("🔓 驗證通過，功能已解鎖");
        nv('v2');
    }

    function nv(id) {
        if(id === 'v2' && !logged) return showToast("⚠️ 請先完成驗證");
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('sb').classList.remove('active');
    }

    function copyCode(idx) {
        // 執行時才解密，防止靜態分析
        const code = atob(db[idx].c);
        navigator.clipboard.writeText(code);
        showToast("✨ 代碼已複製");
    }

    // 初始化與加載動畫
    window.onload = () => {
        let p = 0;
        const it = setInterval(() => {
            p += 5;
            document.getElementById('lp').style.width = p + '%';
            if(p >= 100) {
                clearInterval(it);
                setTimeout(() => document.getElementById('loader').style.opacity = '0', 300);
                setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
            }
        }, 50);

        document.getElementById('menu-btn').onclick = () => document.getElementById('sb').classList.toggle('active');

        // 渲染列表
        document.getElementById('script-list').innerHTML = db.map((s, i) => `
            <div class="glass script-card">
                <b>${s.n}</b>
                <button class="btn-prime" onclick="copyCode(${i})">獲取</button>
            </div>
        `).join('');

        // 粒子動畫
        const cvs = document.getElementById('particles');
        const ctx = cvs.getContext('2d');
        let pts = [];
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        for(let i=0; i<60; i++) pts.push({x: Math.random()*cvs.width, y: Math.random()*cvs.height, vx: Math.random()-0.5, vy: Math.random()-0.5});
        
        function move() {
            ctx.clearRect(0,0,cvs.width,cvs.height);
            ctx.fillStyle = "rgba(0, 255, 204, 0.2)";
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>cvs.width) p.vx*=-1;
                if(p.y<0 || p.y>cvs.height) p.vy*=-1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(move);
        }
        move();
    };
</script>
</body>
</html>
