<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷歐腳本中心 - 旗艦修復版 v3.9</title>
    <style>
        :root { --primary: #00ffcc; --admin-red: #ff4444; --bg: #0a0a0a; --sidebar-bg: #050505; --card-bg: #161616; --text: #ffffff; --gold: #ffd700; }
        * { box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; overflow-x: hidden; }
        .sidebar { width: 240px; height: 100vh; background: var(--sidebar-bg); border-right: 1px solid #333; position: fixed; left: 0; top: 0; transition: 0.3s; z-index: 1000; overflow-y: auto; }
        .sidebar.hidden { transform: translateX(-100%); }
        .sidebar-header { padding: 25px; text-align: center; color: var(--primary); font-weight: bold; font-size: 20px; border-bottom: 1px solid #222; }
        .nav-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; opacity: 0.7; transition: 0.2s; font-size: 14px; }
        .nav-item:hover, .nav-item.active { opacity: 1; background: rgba(0,255,204,0.1); border-left: 4px solid var(--primary); color: var(--primary); }
        .nav-admin { color: var(--admin-red); font-weight: bold; border-top: 1px solid #222; }
        .main-content { margin-left: 240px; width: calc(100% - 240px); padding: 25px; transition: 0.3s; min-height: 100vh; }
        .main-content.expanded { margin-left: 0; width: 100%; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: var(--primary); color: #000; }
        .btn-red { background: var(--admin-red); color: #fff; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; }
        .view { display: none; }
        .view.active { display: block; }
        .forum-box { height: 300px; overflow-y: auto; background: #000; padding: 15px; border-radius: 8px; border: 1px solid #333; margin-bottom: 10px; }
        .egg-container { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        .egg { width: 80px; height: 100px; background: radial-gradient(circle at 30% 30%, #f1c40f, #9c8500); border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">LEO HUB v3.9</div>
    <div class="nav-item active" onclick="showView('v-home')">🏠 脚本创作者</div>
    <div class="nav-item" onclick="showView('v-pts-sys')">💰 積分系統</div>
    <div class="nav-item" onclick="showView('v-forum')">💬 交流中心</div>
    <div id="user-only-nav" style="display:none;">
        <div class="nav-item" onclick="showView('v-draw')">🥚 抽獎系統</div>
        <div class="nav-item" onclick="showView('v-shop')">🛒 積分商店</div>
        <div class="nav-item" onclick="showView('v-feedback')">📩 用戶反饋</div>
    </div>
    <div class="nav-item" onclick="showView('v-contact')">📱 聯繫方式</div>
    <div class="nav-item nav-admin" onclick="showView('v-admin-login')">🛡️ 管理員入口</div>
    <div id="admin-menu" style="display:none;">
        <div class="nav-item nav-admin" onclick="showView('v-mgr-user')">👥 用戶管理</div>
        <div class="nav-item nav-admin" onclick="showView('v-mgr-fb')">💬 反饋管理</div>
        <div class="nav-item nav-admin" onclick="showView('v-mgr-draw')">⚙️ 抽獎控制</div>
    </div>
</aside>

<main class="main-content" id="main-content">
    <div id="v-home" class="view active">
        <div class="card">
            <h2 style="color:var(--primary)">🎨 脚本创作者</h2>
            <p>總負責人：雷欧REO_ROBLOX</p>
            <div id="login-section" style="margin-top:20px;">
                <input type="text" id="user-u" placeholder="使用者名稱">
                <input type="password" id="user-p" placeholder="密碼">
                <button class="btn" onclick="handleLogin()">登入</button>
            </div>
        </div>
    </div>

    <div id="v-forum" class="view">
        <div class="card">
            <h2>💬 交流中心</h2>
            <div class="forum-box" id="forum-content"></div>
            <input type="text" id="chat-input" placeholder="說點什麼...">
            <button class="btn" onclick="sendChat()">發送訊息</button>
        </div>
    </div>

    <div id="v-pts-sys" class="view">
        <div class="card">
            <h2>💰 積分中心</h2>
            <h1 id="display-pts">0</h1>
            <button class="btn" onclick="dailySign()">📅 每日簽到</button>
        </div>
    </div>

    <div id="v-mgr-user" class="view">
        <div class="card">
            <h2>👥 用戶管理</h2>
            <div id="admin-user-list"></div>
        </div>
    </div>

    <div id="v-feedback" class="view">
        <div class="card">
            <h2>📩 用戶反饋</h2>
            <select id="fb-type"><option>腳本問題</option><option>建議</option></select>
            <textarea id="fb-content" placeholder="內容..."></textarea>
            <button class="btn" onclick="submitFeedback()">提交</button>
            <div id="my-fb-history" style="margin-top:20px;"></div>
        </div>
    </div>

    <div id="v-mgr-fb" class="view">
        <div class="card">
            <h2>💬 反饋管理</h2>
            <div id="admin-fb-list"></div>
        </div>
    </div>
    
    <!-- 抽獎、商店、聯繫方式等其餘功能代碼同前... -->
</main>

<script>
    const DB = {
        users: JSON.parse(localStorage.getItem('REO_USERS') || '[{"u":"REO","p":"123","pts":100}]'),
        chats: JSON.parse(localStorage.getItem('REO_CHATS') || '[]'),
        feedbacks: JSON.parse(localStorage.getItem('REO_FB') || '[]')
    };
    let currentU = null;

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'v-forum') renderForum();
        if(id === 'v-mgr-user') renderAdminUsers();
        if(id === 'v-mgr-fb') renderAdminFB();
    }

    function handleLogin() {
        const u = document.getElementById('user-u').value;
        const p = document.getElementById('user-p').value;
        const found = DB.users.find(x => x.u === u && x.p === p);
        if(found) {
            currentU = found;
            document.getElementById('user-only-nav').style.display = 'block';
            document.getElementById('display-pts').innerText = currentU.pts;
            alert("歡迎");
        }
    }

    function renderForum() {
        const box = document.getElementById('forum-content');
        box.innerHTML = DB.chats.map(c => `<div><b style="color:var(--primary)">${c.u}</b>: ${c.m} <small style="color:#666">${c.t}</small></div>`).join('');
        box.scrollTop = box.scrollHeight;
    }

    function sendChat() {
        if(!currentU) return alert("請先登入");
        const m = document.getElementById('chat-input').value;
        if(!m) return;
        DB.chats.push({u: currentU.u, m: m, t: new Date().toLocaleTimeString()});
        localStorage.setItem('REO_CHATS', JSON.stringify(DB.chats));
        document.getElementById('chat-input').value = '';
        renderForum();
    }

    function renderAdminUsers() {
        const list = document.getElementById('admin-user-list');
        list.innerHTML = DB.users.map(u => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <span>${u.u} (積分: ${u.pts})</span>
                <div>
                    <button class="btn" onclick="editPts('${u.u}')">改分</button>
                    <button class="btn-red" onclick="delUser('${u.u}')">刪除</button>
                </div>
            </div>
        `).join('');
    }

    function editPts(username) {
        const newPts = prompt("輸入新積分:");
        if(newPts === null) return;
        const user = DB.users.find(x => x.u === username);
        user.pts = parseInt(newPts);
        localStorage.setItem('REO_USERS', JSON.stringify(DB.users));
        renderAdminUsers();
    }

    // 存檔與其他基礎功能省略，結構與前版本一致
</script>
</body>
</html>
