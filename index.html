<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KG Script System - v2.6</title>
    <style>
        :root { --main: #00ffcc; --bg: #050505; --red: #ff4444; --card: rgba(10,10,10,0.98); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: 0.2s ease; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* 🟦 初次加載（僅在開啟網頁時出現一次） */
        #loader { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .prog-wrap { width: 200px; height: 2px; background: #111; margin-top: 20px; }
        .prog-bar { height: 100%; width: 0%; background: var(--main); box-shadow: 0 0 15px var(--main); }

        /* 🍔 側邊欄 */
        .menu-btn { position: fixed; top: 20px; left: 20px; font-size: 28px; z-index: 10000; cursor: pointer; color: white; }
        .sidebar { position: fixed; left: -280px; top: 0; width: 260px; height: 100%; background: #080808; z-index: 9500; padding-top: 80px; border-right: 1px solid var(--main); }
        .sidebar.open { left: 0; }
        .menu-item { padding: 18px 25px; border-bottom: 1px solid #111; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .menu-item:hover { background: #111; color: var(--main); }

        /* 🌐 頂部控制列（切換與Logo） */
        .header-tools { position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; align-items: center; gap: 15px; }
        .lang-btn { padding: 5px 12px; background: #111; border: 1px solid #333; border-radius: 5px; color: #fff; font-size: 12px; cursor: pointer; }
        .lang-btn.active { border-color: var(--main); color: var(--main); }

        /* 🖼️ Logo 異常修復 */
        .logo-mini { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #fff; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #000; font-weight: bold; color: var(--main); }

        /* 📱 內容視圖切換器（核心無刷新邏輯） */
        #app-container { height: 100vh; width: 100vw; display: none; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .view { display: none; width: 100%; max-width: 400px; text-align: center; animation: fadeIn 0.4s forwards; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* 💳 共通卡片樣式 */
        .card { background: var(--card); border: 1px solid #222; border-radius: 25px; padding: 35px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-main { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--main); color: #000; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-main:active { transform: scale(0.94); box-shadow: 0 0 30px var(--main); }
        
        input { width: 100%; padding: 16px; background: #000; border: 1px solid #333; border-radius: 12px; color: #fff; text-align: center; margin-bottom: 10px; font-size: 16px; }
        pre { background: #000; padding: 15px; border-radius: 10px; color: #0f0; font-size: 11px; overflow-x: auto; text-align: left; border: 1px solid #222; margin-top: 10px; }
        
        /* 👑 管理後台內嵌列表 */
        .key-list { max-height: 150px; overflow-y: auto; background: #000; border-radius: 10px; margin-top: 10px; border: 1px solid #111; }
        .key-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #080808; font-size: 12px; }
    </style>
</head>
<body>

<div id="loader">
    <div id="perc" style="color:var(--main); font-size:24px; font-weight:900;">0%</div>
    <div class="prog-wrap"><div class="prog-bar" id="bar"></div></div>
</div>

<div class="header-tools">
    <div class="lang-btn active" onclick="changeLang('zh')">ZH</div>
    <div class="lang-btn" onclick="changeLang('en')">EN</div>
    <div class="logo-mini">
        <img src="https://i.postimg.cc/mD8zM9f1/kg-logo.png" style="width:100%" onerror="this.style.display='none'">
        <span style="position:absolute;">KG</span>
    </div>
</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="sidebar" id="sidebar">
    <div class="menu-item" onclick="switchView('view-home')">🏠 <span data-zh="返回主頁" data-en="Home">返回主頁</span></div>
    <div class="menu-item" onclick="switchView('view-copy')">📋 <span data-zh="腳本複製" data-en="Copy Script">腳本複製</span></div>
    <div class="menu-item" onclick="switchView('view-func')">✨ <span data-zh="腳本功能" data-en="Features">腳本功能</span></div>
    <div class="menu-item" onclick="switchView('view-log')">📅 <span data-zh="更新日誌" data-en="Update Log">更新日誌</span></div>
    <div class="menu-item" onclick="switchView('view-pay')" style="color: gold;">💰 <span data-zh="支持一下" data-en="Donation">支持一下</span></div>
</div>

<div id="app-container">
    <div id="view-home" class="view active">
        <div class="card">
            <h2 data-zh="KG 卡密驗證" data-en="KG Key Auth">KG 卡密驗證</h2>
            <input type="text" id="key-input" placeholder="請輸入卡密..." data-zh-p="請輸入卡密..." data-en-p="Enter Card Key...">
            <button class="btn-main" onclick="verify()" data-zh="驗證進入" data-en="Authenticate">驗證進入</button>
            
            <div id="admin-ui" style="display:none; margin-top:30px; border-top:1px solid #333; padding-top:20px;">
                <h4 style="color:var(--main);" data-zh="管理控制台" data-en="Admin Panel">管理控制台</h4>
                <button class="btn-main" style="padding:10px;" onclick="genKey()" data-zh="⚡ 生成新卡密" data-en="⚡ Gen Key">⚡ 生成新卡密</button>
                <div class="key-list" id="list"></div>
                <button class="btn-main" style="background:var(--red); color:#fff; padding:10px;" onclick="delKey()" data-zh="🗑️ 批量刪除" data-en="🗑️ Delete">🗑️ 批量刪除</button>
            </div>
        </div>
    </div>

    <div id="view-copy" class="view">
        <div class="card">
            <h3 data-zh="腳本代碼" data-en="Script Code">腳本代碼</h3>
            <pre id="code-area">loadstring(game:HttpGet("https://raw.githubusercontent.com/KG/main/script.lua"))()</pre>
            <button class="btn-main" onclick="copy()" data-zh="一鍵複製" data-en="Copy All">一鍵複製</button>
        </div>
    </div>

    <div id="view-func" class="view">
        <div class="card">
            <h3 data-zh="功能清單" data-en="Feature List">功能清單</h3>
            <ul style="text-align:left; font-size:14px; color:var(--main);">
                <li>Aimbot / 自動瞄準</li>
                <li>ESP Wallhack / 透視</li>
                <li>No Recoil / 無後坐力</li>
            </ul>
        </div>
    </div>

    <div id="view-log" class="view">
        <div class="card">
            <h3 data-zh="更新日誌" data-en="Change Log">更新日誌</h3>
            <p style="font-size:12px; color:#666;">v2.6 - 2026.05.11<br>• SPA 無刷新架構升級<br>• 全面更換為卡密系統</p>
        </div>
    </div>

    <div id="view-pay" class="view">
        <div class="card">
            <h3 data-zh="支持創作者 ($)" data-en="Support ($)">支持創作者 ($)</h3>
            <div style="width:120px; height:120px; background:#fff; margin:20px auto; border-radius:10px;"></div>
            <p data-zh="點擊贊助我們" data-en="Donate to us">點擊贊助我們</p>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('kg_v2_db')) || [];
    let curLang = 'zh';

    // 無刷新視圖切換邏輯
    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        toggleMenu(false);
    }

    function toggleMenu(force) {
        const s = document.getElementById('sidebar');
        if(force === false) s.classList.remove('open');
        else s.classList.toggle('open');
    }

    function changeLang(l) {
        curLang = l;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.querySelectorAll('[data-zh]').forEach(el => {
            el.innerText = el.getAttribute('data-' + l);
        });
        const inp = document.getElementById('key-input');
        inp.placeholder = inp.getAttribute('data-' + l + '-p');
    }

    // 卡密驗證與管理
    function verify() {
        const val = document.getElementById('key-input').value;
        if(val === 'KGscriptWEB:admin') {
            document.getElementById('admin-ui').style.display = 'block';
            alert(curLang === 'zh' ? '管理員權限已解鎖' : 'Admin Access Granted');
        } else {
            const found = db.find(k => k.code === val);
            if(found) alert('Success!');
            else alert('Invalid Key');
        }
    }

    function genKey() {
        const code = "KGCARD-" + Math.random().toString(36).substr(2, 7).toUpperCase();
        db.push({ id: Date.now(), code: code });
        save();
    }

    function delKey() {
        const cks = document.querySelectorAll('.ck:checked');
        const ids = Array.from(cks).map(c => parseInt(c.dataset.id));
        db = db.filter(k => !ids.includes(k.id));
        save();
    }

    function save() {
        localStorage.setItem('kg_v2_db', JSON.stringify(db));
        renderList();
    }

    function renderList() {
        const box = document.getElementById('list');
        box.innerHTML = db.map(k => `
            <div class="key-item">
                <input type="checkbox" class="ck" data-id="${k.id}">
                <span style="color:var(--main); margin-left:10px;">${k.code}</span>
            </div>
        `).join('') || '<div style="padding:10px; color:#333;">EMPTY</div>';
    }

    function copy() {
        navigator.clipboard.writeText(document.getElementById('code-area').innerText);
        alert('Copied!');
    }

    // 初次啟動加載條
    window.onload = () => {
        let p = 0;
        const b = document.getElementById('bar'), t = document.getElementById('perc');
        const itv = setInterval(() => {
            p += Math.floor(Math.random()*6)+2;
            if(p >= 100) {
                p=100; clearInterval(itv);
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('app-container').style.display = 'flex';
                }, 500);
            }
            b.style.width = p + "%"; t.innerText = p + "%";
        }, 50);
        renderList();
    };
</script>
</body>
</html>
