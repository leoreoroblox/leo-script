<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KG SUPREME | COMMANDER EDITION</title>
    <style>
        :root { --main: #00ffcc; --bg: #000; --card: rgba(10,10,10,0.95); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* 1. 全網公告欄 (雲端同步) */
        .global-notice {
            position: fixed; top: 0; width: 100%; background: rgba(0,255,204,0.15);
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--main);
            padding: 10px; z-index: 9000; font-size: 13px; color: var(--main);
            display: flex; align-items: center; justify-content: center; transition: 0.5s;
        }
        .live-dot { width: 7px; height: 7px; background: #f00; border-radius: 50%; margin-right: 10px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* 2. 開機動畫與隨機語錄 */
        #loader { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 1s; }
        .load-logo { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--main); box-shadow: 0 0 30px var(--main); }
        #load-msg { margin-top: 25px; font-size: 15px; letter-spacing: 3px; color: var(--main); font-weight: bold; text-align: center; }

        /* 3. 核心介面 */
        canvas { position: fixed; inset: 0; z-index: -1; }
        .container { position: relative; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .page { position: absolute; width: 92%; max-width: 420px; opacity: 0; pointer-events: none; transition: 0.5s; transform: scale(0.9); }
        .page.active { opacity: 1; pointer-events: auto; transform: scale(1); }
        .card { background: var(--card); border-radius: 30px; border: 1px solid rgba(0,255,204,0.3); padding: 35px; backdrop-filter: blur(25px); text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }

        /* 4. UI 元素 */
        .kg-logo { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--main); margin-bottom: 20px; cursor: pointer; }
        input, select { width: 100%; padding: 16px; margin: 10px 0; border-radius: 15px; border: 1px solid #333; background: #000; color: var(--main); font-size: 16px; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--main); color: #000; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .qq-link { color: var(--main); text-decoration: none; font-size: 12px; margin: 10px; display: inline-block; border-bottom: 1px solid var(--main); }

        /* 5. 管理員/偽裝系統 */
        #admin-login { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        #admin-panel { display: none; position: fixed; inset: 0; background: #050505; z-index: 9500; padding: 25px; overflow-y: auto; font-family: monospace; }
        
        .nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; background: rgba(255,255,255,0.05); backdrop-filter: blur(30px); border-radius: 25px; display: flex; padding: 7px; border: 1px solid rgba(255,255,255,0.1); z-index: 8000; }
        .nav-item { flex: 1; padding: 12px; text-align: center; font-size: 13px; color: #555; cursor: pointer; }
        .nav-item.active { color: var(--main); }
    </style>
</head>
<body>

<div class="global-notice" id="notice-bar"><div class="live-dot"></div><span id="cloud-notice">📡 正在同步天網指揮中心...</span></div>

<div id="loader">
    <img src="https://telegra.ph/file/0c3260c675339d675685a.jpg" class="load-logo">
    <div id="load-msg">INITIATING...</div>
</div>

<canvas id="canvas"></canvas>

<div class="container">
    <div class="page active" id="pg-home">
        <div class="card">
            <img src="https://telegra.ph/file/0c3260c675339d675685a.jpg" class="kg-logo" id="admin-trigger">
            <h3 style="margin:0; letter-spacing:2px;">KG CENTER</h3>
            <div id="maint-overlay" style="display:none; color:red; font-size:12px; margin:10px 0;">[ 系統遠端鎖死中 ]</div>
            
            <input type="text" id="iKey" placeholder="請輸入授權碼">
            <button class="btn" onclick="verify()">驗證並注入腳本</button>
            
            <div>
                <a href="mqqwpa://im/chat?chat_type=wpa&uin=3065395172" class="qq-link">聯繫張碩</a>
                <a href="mqqwpa://im/chat?chat_type=wpa&uin=2031480494" class="qq-link">聯繫雷歐</a>
            </div>
        </div>
    </div>
    </div>

<div id="admin-login">
    <div class="card" style="width:100%;" id="login-box">
        <h3 style="color:var(--main)">COMMANDER AUTH</h3>
        <input type="text" id="adm-user" placeholder="USER">
        <input type="password" id="adm-pass" placeholder="PASS">
        <button class="btn" onclick="checkAuth()">SIGN IN</button>
        <button class="btn" style="background:none; color:#333;" onclick="closeLogin()">CANCEL</button>
    </div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; border-bottom:1px solid var(--main); padding-bottom:15px;">
        <span style="color:var(--main)">LEOREOROBLOX DASHBOARD</span>
        <button onclick="exitAdmin()" style="color:red; background:none; border:none;">CLOSE</button>
    </div>
    <div class="card" style="width:100%; text-align:left; margin-top:20px;">
        <p>遠端指令控制 (本地模擬)</p>
        <input type="text" id="adm-cmd" placeholder="輸入公告文字...">
        <button class="btn" onclick="updateNoticeLocal()">發布公告</button>
        <button class="btn" style="margin-top:20px; background:orange;" onclick="toggleMaint()">切換維護狀態</button>
        <button class="btn" style="margin-top:20px; background:#222;" onclick="forgetMe()">清除記憶</button>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="nav('home',0)">主機</div>
    <div class="nav-item" onclick="nav('script',1)">核心</div>
    <div class="nav-item" onclick="nav('contact',3)">聯絡</div>
</nav>

<script>
    // 1. 隨機開機語錄 (提議 3)
    const quotes = ["正在加密衛星連線...", "檢測到 LeoReoRoblox 訊號...", "KG 核心組件載入中...", "正在優化腳本環境...", "張碩 & 雷歐 竭誠服務"];
    let qIdx = 0;
    const qTimer = setInterval(() => {
        document.getElementById('load-msg').innerText = quotes[qIdx++];
        if(qIdx >= quotes.length) {
            clearInterval(qTimer);
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                if(localStorage.getItem('isKGAdmin') === 'true') openAdmin();
            }, 1000);
        }
    }, 1000);

    // 2. 雲端同步系統 (提議 1) - 預留介面
    async function syncCloud() {
        // 此處未來可更換為真正的 GitHub Gist 網址
        console.log("正在監控雲端指令...");
    }
    syncCloud();

    // 3. 管理員與偽裝邏輯 (提議 2)
    let failCount = 0;
    let longPress;
    const trigger = document.getElementById('admin-trigger');
    trigger.onmousedown = trigger.ontouchstart = () => { longPress = setTimeout(showLogin, 2000); };
    trigger.onmouseup = trigger.ontouchend = () => { clearTimeout(longPress); };

    function showLogin() {
        if(localStorage.getItem('isKGAdmin') === 'true') { openAdmin(); }
        else { document.getElementById('admin-login').style.display = 'flex'; }
    }
    function closeLogin() { document.getElementById('admin-login').style.display = 'none'; }

    function checkAuth() {
        const u = document.getElementById('adm-user').value;
        const p = document.getElementById('adm-pass').value;
        if(u === 'LeoReoRoblox' && p === 'KGscriptWEB:admin') {
            localStorage.setItem('isKGAdmin', 'true');
            closeLogin(); openAdmin();
        } else {
            failCount++;
            if(failCount >= 3) {
                document.getElementById('login-box').innerHTML = "<h3 style='color:red'>連接超時</h3><p>由於多次嘗試失敗，資料庫已鎖定。</p>";
                setTimeout(() => location.reload(), 3000); // 偽裝成報錯 (提議 2)
            } else { alert('身分驗證失敗'); }
        }
    }

    function openAdmin() { document.getElementById('admin-panel').style.display = 'block'; }
    function exitAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    function forgetMe() { localStorage.removeItem('isKGAdmin'); location.reload(); }

    // 4. 背景粒子與基礎導航
    const cv = document.getElementById('canvas'); const ct = cv.getContext('2d'); let ps = [];
    function rs() { cv.width = window.innerWidth; cv.height = window.innerHeight; } window.onresize = rs; rs();
    for(let i=0; i<30; i++) ps.push({x:Math.random()*cv.width, y:Math.random()*cv.height, s:Math.random()+0.3});
    function lp() { ct.clearRect(0,0,cv.width,cv.height); ct.fillStyle = '#00ffcc22'; ps.forEach(p=>{p.y-=p.s; if(p.y<0)p.y=cv.height; ct.beginPath(); ct.arc(p.x,p.y,1,0,Math.PI*2); ct.fill();}); requestAnimationFrame(lp); } lp();

    function updateNoticeLocal() {
        const t = document.getElementById('adm-cmd').value;
        if(t) document.getElementById('cloud-notice').innerText = t;
    }

    let isMaint = false;
    function toggleMaint() {
        isMaint = !isMaint;
        document.getElementById('maint-overlay').style.display = isMaint ? 'block' : 'none';
        document.getElementById('notice-bar').style.background = isMaint ? 'rgba(255,0,0,0.2)' : 'rgba(0,255,204,0.15)';
    }

    function nav(p, i) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById('pg-'+p).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelectorAll('.nav-item')[i].classList.add('active');
    }

    function verify() {
        if(isMaint) alert('系統遠端鎖死中，請留意最新公告！');
        else alert('正在加密驗證...');
    }
</script>
</body>
</html>
