<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雷歐腳本</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        /* 載入動畫 */
        #ld { position: fixed; inset: 0; background: #000; z-index: 9; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #pg { width: 200px; height: 4px; background: #1a1a1a; border-radius: 2px; margin: 20px; overflow: hidden; }
        #pb { width: 0%; height: 100%; background: #0fc; box-shadow: 0 0 10px #0fc; transition: 0.1s; }
        
        .hd { position: fixed; top: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.8); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #1a1a1a; z-index: 5; }
        .sb { position: fixed; left: -250px; top: 0; width: 240px; height: 100%; background: #050505; transition: 0.3s; padding-top: 60px; border-right: 1px solid #1a1a1a; z-index: 8; }
        .sb.on { left: 0; }
        .ni { padding: 15px 25px; cursor: pointer; color: #aaa; font-size: 14px; }
        .ni.act { color: #0fc; background: rgba(0,255,204,0.1); }

        .vw { display: none; padding: 70px 20px; height: 100vh; overflow-y: auto; }
        .vw.act { display: block; }
        .cd { background: #0a0a0a; border: 1px solid #1c1c1c; border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        
        input { width: 100%; padding: 12px; background: #121212; border: 1px solid #1c1c1c; border-radius: 10px; color: #fff; margin-bottom: 10px; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .b-m { background: #0fc; color: #000; }
        
        .s-cd { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #1a1a1a; }
        .b-g { color: #f33; border: 1px solid #f33; background: none; padding: 5px 12px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="ld">
    <div style="color:#0fc; font-weight:900; letter-spacing:3px;">LEO SCRIPT</div>
    <div id="pg"><div id="pb"></div></div>
    <div id="pt" style="font-size:12px; color:#666;">0%</div>
</div>

<div class="hd">
    <div onclick="tk()" style="cursor:pointer;">☰</div>
    <div style="margin-left:15px; color:#0fc; font-weight:bold;">雷歐腳本</div>
</div>

<div class="sb" id="sb">
    <div class="ni act" onclick="nv('v1')">📢 系統公告</div>
    <div class="ni" onclick="nv('v2')">🔗 其他腳本</div>
    <div class="ni" onclick="nv('v3')">👨‍💻 創作者</div>
</div>

<div id="v1" class="vw act">
    <div class="cd">
        <h2>雷歐登入</h2>
        <input type="text" id="u" placeholder="用戶名">
        <button class="btn b-m" onclick="lg()">登入</button>
    </div>
</div>

<div id="v2" class="vw">
    <div class="cd" id="sl"></div>
</div>

<div id="v3" class="vw">
    <div class="cd"><h3>創作者：雷歐 REO</h3></div>
</div>

<script>
    const sc = [
        { n: "墨水遊戲", c: `loadstring(game:HttpGet("https://raw.githubusercontent.com/hdjsjjdgrhj/script-hub/refs/heads/main/Ringta"))()` },
        { n: "最新皮腳本", c: `getgenv().XiaoPi="皮脚本QQ群1002100032" loadstring(game:HttpGet("https://raw.githubusercontent.com/xiaopi77/xiaopi77/main/QQ1002100032-Roblox-Pi-script.lua"))()` },
        { n: "縫合脚本", c: `loadstring(game:HttpGet("https://raw.githubusercontent.com/JsYb666/TX-Free-YYDS/refs/heads/main/TX-Pro-Free"))()` },
        { n: "被遺棄", c: `loadstring(game:HttpGet("https://raw.githubusercontent.com/JackUltraman/fish/refs/heads/main/%E8%A2%AB%E9%81%97%E5%BC%83"))()` },
        { n: "死鐵鬼", c: `loadstring(game:HttpGet("https://raw.githubusercontent.com/thantzy/thanhub/refs/heads/main/thanv1"))()` },
        { n: "葉脚本", c: `loadstring(game:HttpGet("https://raw.githubusercontent.com/roblox-ye/QQ515966991/refs/heads/main/ROBLOX-CNVIP-XIAOYE.lua"))()` }
    ];

    function tk() { document.getElementById('sb').classList.toggle('on'); }
    function nv(id) {
        document.querySelectorAll('.vw').forEach(v => v.classList.remove('act'));
        document.getElementById(id).classList.add('act');
        tk();
    }

    function lg() { alert("登入成功"); nv('v2'); }
    function cp(i) { navigator.clipboard.writeText(sc[i].c); alert("複製成功"); }

    window.onload = () => {
        let p = 0;
        const i = setInterval(() => {
            p += 10;
            document.getElementById('pb').style.width = p + '%';
            document.getElementById('pt').innerText = p + '%';
            if (p >= 100) { clearInterval(i); setTimeout(() => document.getElementById('ld').style.display='none', 300); }
        }, 100);

        document.getElementById('sl').innerHTML = sc.map((s, i) => `
            <div class="s-cd">
                <span>${s.n}</span>
                <button class="b-g" onclick="cp(${i})">獲取</button>
            </div>
        `).join('');
    };
</script>
</body>
</html>
