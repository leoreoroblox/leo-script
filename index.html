<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KG</title>
    <style>
        :root { --main: #00ffcc; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Consolas', monospace; overflow: hidden; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* 🟦 加載介面 */
        #loader { 
            position: fixed; inset: 0; background: #000; z-index: 20000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .progress-container { width: 240px; height: 2px; background: #111; margin-top: 25px; position: relative; }
        .progress-bar { height: 100%; width: 0%; background: var(--main); box-shadow: 0 0 15px var(--main); transition: width 0.1s linear; }
        #progress-perc { color: var(--main); font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        #loader-status { font-size: 10px; color: #444; letter-spacing: 2px; text-transform: uppercase; }

        /* 💳 驗證卡片 (全刪後僅存核心) */
        .card { 
            text-align: center; opacity: 0; transform: scale(0.9); transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%; max-width: 320px;
        }
        .card.show { opacity: 1; transform: scale(1); }

        .logo-text { font-size: 42px; font-weight: 900; color: #fff; letter-spacing: -2px; margin-bottom: 40px; }
        .logo-text span { color: var(--main); }

        input { 
            width: 100%; padding: 20px; border: none; border-bottom: 2px solid #222; 
            background: transparent; color: #fff; text-align: center; font-size: 16px; transition: 0.3s;
        }
        input:focus { border-bottom-color: var(--main); }

        .btn-main { 
            width: 100%; padding: 20px; margin-top: 30px; border: none; 
            background: var(--main); color: #000; font-weight: 900; cursor: pointer;
            transition: all 0.3s; clip-path: polygon(0 0, 90% 0, 100% 30%, 100% 100%, 10% 100%, 0 70%);
        }
        .btn-main:active { transform: scale(0.9); filter: brightness(1.5); box-shadow: 0 0 40px var(--main); }

    </style>
</head>
<body>

<div id="loader">
    <div id="progress-perc">0%</div>
    <div id="loader-status">System Initializing</div>
    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>
</div>

<div class="card" id="main-ui">
    <div class="logo-text">KG<span>.</span></div>
    <input type="password" id="auth-code" placeholder="ENTER ACCESS CODE">
    <button class="btn-main" onclick="checkAuth()">AUTHENTICATE</button>
</div>

<script>
    // 加載邏輯
    window.onload = () => {
        let progress = 0;
        const bar = document.getElementById('bar');
        const perc = document.getElementById('progress-perc');
        
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 4) + 1;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('main-ui').classList.add('show');
                }, 400);
            }
            bar.style.width = progress + "%";
            perc.innerText = progress + "%";
        }, 50);
    };

    function checkAuth() {
        const val = document.getElementById('auth-code').value;
        if(val === 'KGscriptWEB:admin') {
            alert('ACCEPTED');
            location.reload();
        } else if(val !== "") {
            alert('DENIED');
        }
    }
</script>
</body>
</html>
