<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雷歐腳本中心 | 登入系統</title>
    <style>
        :root { --primary: #00ffcc; --bg: #050505; --glass: rgba(255,255,255,0.03); --admin-red: #ff4d4d; --gold: #ffd700; --card-bg: rgba(10, 10, 10, 0.95); --btn-grad: linear-gradient(135deg, #FF6B00 0%, #FF9900 100%); }
        * { cursor: none !important; box-sizing: border-box; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; } 
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; color: #fff; background: #000; }
        
        /* 游標效果 */
        #cursor-dot { position: fixed; width: 6px; height: 6px; background: var(--primary); border-radius: 50%; pointer-events: none; z-index: 10000; }
        #cursor-glow { position: fixed; width: 200px; height: 200px; background: radial-gradient(circle, rgba(0,255,204,0.1) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); }

        /* 介面框架 */
        .header { position: fixed; top: 0; width: 100%; height: 60px; display: flex; align-items: center; padding: 0 25px; z-index: 1000; background: rgba(0,0,0,0.8); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .view { display: none; padding: 100px 20px; height: 100vh; overflow-y: auto; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 登入/註冊卡片 */
        .auth-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; max-width: 380px; margin: auto; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); display: none; }
        .auth-card.active { display: block; }
        
        h2 { text-align: center; font-size: 20px; letter-spacing: 2px; margin-bottom: 30px; color: #fff; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,255,204,0.2); }
        
        .btn { background: var(--btn-grad); color: #fff; padding: 14px; border-radius: 12px; border: none; font-weight: 900; width: 100%; margin-top: 15px; cursor: pointer; transition: 0.3s; }
        .btn:active { transform: scale(0.96); }

        /* 註冊連結佈局 */
        .link-row { display: flex; justify-content: flex-end; font-size: 12px; color: var(--primary); margin: 5px 0 15px; }
        .footer-links { text-align: center; margin-top: 25px; font-size: 12px; color: #888; }
        .footer-links span, .footer-links a { color: var(--primary); cursor: pointer; text-decoration: none; }

        #toast { position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%); background: #1c221d; color: #fff; padding: 12px 35px; border-radius: 50px; font-weight: bold; transition: 0.5s; z-index: 10000; border: 1px solid #333; }
    </style>
</head>
<body onload="init()">

<div id="cursor-dot"></div>
<div id="cursor-glow"></div>

<header class="header">
    <div style="font-weight:900; letter-spacing:2px; user-select: none; cursor: pointer;" ondblclick="showCard('admin-card')">雷歐腳本中心</div>
</header>

<main class="view active" id="v-auth">
    <div class="auth-card active" id="login-card">
        <h2>雷歐腳本中心登入系統</h2>
        <input type="text" id="l-user" placeholder="使用者名稱/Email">
        <input type="password" id="l-pass" placeholder="密碼">
        <div class="link-row">
            <span onclick="showCard('reg-card')" style="cursor:pointer;">沒有帳號？點我註冊</span>
        </div>
        <button class="btn" onclick="doLogin()">登入</button>
    </div>

    <div class="auth-card" id="reg-card">
        <h2>註冊雷歐腳本中心</h2>
        <input type="text" id="r-user" placeholder="使用者名稱/Email">
        <input type="password" id="r-pass" placeholder="設定密碼">
        <button class="btn" onclick="doRegister()">註冊帳號</button>
        <div class="footer-links">
            已經有帳號了？ <span onclick="showCard('login-card')">點我登入</span><br><br>
            <a href="#">忘記密碼？</a>
        </div>
    </div>

    <div class="auth-card" id="admin-card">
        <h2 style="color:var(--admin-red);">管理員後台認證</h2>
        <input type="text" id="a-user" placeholder="管理員帳號">
        <input type="password" id="a-pass" placeholder="安全密鑰">
        <button class="btn" style="background:var(--admin-red);" onclick="doAdminLogin()">認證管理員</button>
        <div class="footer-links"><span onclick="showCard('login-card')">返回普通登入</span></div>
    </div>
</main>

<div id="toast">訊息提示</div>

<script>
    // 游標
    window.addEventListener('mousemove', e => {
        document.getElementById('cursor-dot').style.left = e.x + 'px';
        document.getElementById('cursor-dot').style.top = e.y + 'px';
        const glow = document.getElementById('cursor-glow');
        glow.style.left = e.x + 'px'; glow.style.top = e.y + 'px';
    });

    let USERS = JSON.parse(localStorage.getItem('LEO_USERS')) || [];
    
    function init() { console.log("系統就緒"); }

    function msg(t) {
        const o = document.getElementById('toast');
        o.innerText = t; o.style.bottom = '40px';
        setTimeout(() => o.style.bottom = '-80px', 2500);
    }

    function showCard(id) {
        document.querySelectorAll('.auth-card').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // 登入
    function doLogin() {
        const u = document.getElementById('l-user').value;
        const p = document.getElementById('l-pass').value;
        if(!u || !p) return msg("請輸入帳號和密碼");

        const user = USERS.find(x => x.u === u && x.p === p);
        if(user) {
            msg("登入成功！歡迎回到雷歐腳本中心");
            // 這裡可以跳轉到你的腳本頁面
        } else {
            msg("登入失敗：帳號或密碼錯誤");
        }
    }

    // 註冊
    function doRegister() {
        const u = document.getElementById('r-user').value;
        const p = document.getElementById('r-pass').value;
        if(!u || !p) return msg("註冊資料不能為空");

        if(USERS.find(x => x.u === u)) return msg("該帳號已存在");

        USERS.push({u, p});
        localStorage.setItem('LEO_USERS', JSON.stringify(USERS));
        msg("註冊成功！現在可以登入了");
        showCard('login-card');
    }

    // 管理員登入
    function doAdminLogin() {
        const u = document.getElementById('a-user').value;
        const p = document.getElementById('a-pass').value;
        if(u === "admin" && p === "LEO_888") {
            msg("管理員認證成功");
            // 進入管理介面
        } else {
            msg("認證失敗：權限不足");
        }
    }
</script>
</body>
</html>
